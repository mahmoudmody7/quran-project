<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Studio - Pro Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Readex+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Modern Dark Theme - Ocean Blue & Purple Gradient */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --bg-input: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border: #475569;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            margin: 0; 
            padding: 0; 
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Mobile-First Responsive Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @media (min-width: 1024px) {
            .app-container {
                flex-direction: row;
            }
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        /* Modern Tabs */
        .tab-btn { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }
        
        .tab-btn.active { 
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }
        
        .tab-btn.active::before {
            opacity: 1;
        }
        
        .tab-btn:not(.active):hover { 
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }

        /* Timeline */
        .timeline-clip { 
            transition: all 0.3s ease;
            border-radius: 8px;
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .timeline-clip.active { 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        /* Canvas Container - Fixed Background Movement */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 60vh;
            background: radial-gradient(circle at center, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (min-width: 1024px) {
            .canvas-wrapper {
                height: 70vh;
            }
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            background: #000;
        }

        /* Modern Inputs */
        select, input[type="text"], input[type="number"], input[type="file"] {
            background: var(--bg-input);
            border: 2px solid transparent;
            color: var(--text-primary);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s;
            width: 100%;
            font-size: 0.9rem;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        select option {
            background: var(--bg-panel);
            color: var(--text-primary);
        }

        select optgroup {
            background: var(--bg-dark);
            color: var(--accent);
            font-weight: 700;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-input);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            cursor: pointer;
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { 
            background: var(--primary); 
            border-radius: 3px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary); }

        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Mobile Optimizations */
        .mobile-scroll {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Audio Visualizer Canvas Overlay */
        .viz-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            pointer-events: none;
        }

        /* Loading Animation */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        
        .loading-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        /* Hide file input */
        input[type="file"] {
            padding: 8px;
            font-size: 0.8rem;
        }

        input[type="file"]::file-selector-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            margin-left: 10px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
        }

        /* Responsive Sidebar */
        .sidebar {
            width: 100%;
            max-height: 40vh;
            overflow-y: auto;
        }

        @media (min-width: 1024px) {
            .sidebar {
                width: 400px;
                max-height: none;
                height: calc(100vh - 80px);
            }
        }

        /* Preview Section */
        .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        @media (min-width: 1024px) {
            .preview-section {
                padding: 24px;
            }
        }

        /* Status Box */
        .status-box {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.3s;
            border-radius: 3px;
        }
    </style>
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<body>

    <!-- Header -->
    <header class="glass-panel mx-4 mt-4 mb-2 px-6 py-4 flex items-center justify-between shrink-0 z-20">
        <div class="flex items-center gap-3">
            <div class="relative w-10 h-10 flex items-center justify-center">
                <div class="loading-ring"></div>
                <i class="fa-solid fa-circle-play text-2xl text-indigo-500"></i>
            </div>
            <div>
                <h1 class="font-black text-xl tracking-wide">Quran<span class="gradient-text">Studio</span></h1>
                <span class="text-[10px] text-slate-400 uppercase tracking-wider">Pro Edition</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="savePreset()" class="btn-secondary hidden sm:flex items-center gap-2 text-xs">
                <i class="fa-solid fa-download"></i> <span class="hidden md:inline">حفظ</span>
            </button>
            <button onclick="loadPreset()" class="btn-secondary hidden sm:flex items-center gap-2 text-xs">
                <i class="fa-solid fa-upload"></i> <span class="hidden md:inline">استرجاع</span>
            </button>
            <button id="generate-btn" class="btn-primary flex items-center gap-2 text-sm">
                <i class="fa-solid fa-play"></i> <span>تصدير</span>
            </button>
        </div>
    </header>

    <div class="app-container px-4 pb-4 gap-4">
        
        <!-- Sidebar Settings -->
        <aside class="sidebar glass-panel flex flex-col shrink-0 overflow-hidden">
            <!-- Tabs Navigation -->
            <div class="flex p-3 gap-2 border-b border-slate-700/50 bg-slate-900/30">
                <button onclick="switchTab('basic')" id="tab-basic" class="tab-btn active flex-1 text-xs font-bold py-3 text-slate-300 flex flex-col items-center gap-1">
                    <i class="fa-solid fa-list text-lg"></i>
                    <span>المحتوى</span>
                </button>
                <button onclick="switchTab('style')" id="tab-style" class="tab-btn flex-1 text-xs font-bold py-3 text-slate-400 flex flex-col items-center gap-1">
                    <i class="fa-solid fa-image text-lg"></i>
                    <span>المشهد</span>
                </button>
                <button onclick="switchTab('text')" id="tab-text" class="tab-btn flex-1 text-xs font-bold py-3 text-slate-400 flex flex-col items-center gap-1">
                    <i class="fa-solid fa-font text-lg"></i>
                    <span>النصوص</span>
                </button>
                <button onclick="switchTab('audio')" id="tab-audio" class="tab-btn flex-1 text-xs font-bold py-3 text-slate-400 flex flex-col items-center gap-1">
                    <i class="fa-solid fa-wave-square text-lg"></i>
                    <span>الصوت</span>
                </button>
            </div>

            <div class="p-4 overflow-y-auto flex-1 text-sm space-y-5 mobile-scroll">
                
                <!-- Tab 1: Basics -->
                <div id="content-basic" class="space-y-4">
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 space-y-3">
                        <label class="block text-indigo-400 font-bold text-xs flex items-center gap-2">
                            <i class="fa-solid fa-microphone"></i> اختيار القارئ
                        </label>
                        <select id="reciter" class="w-full"></select>
                        
                        <label class="block text-slate-400 font-bold text-xs mt-4">السورة</label>
                        <select id="surah" class="w-full"></select>
                        
                        <div class="grid grid-cols-2 gap-3 mt-4">
                            <div>
                                <label class="block mb-1 text-slate-500 text-xs">من الآية</label>
                                <input id="start-ayah" type="number" value="1" min="1" class="w-full text-center">
                            </div>
                            <div>
                                <label class="block mb-1 text-slate-500 text-xs">إلى الآية</label>
                                <input id="end-ayah" type="number" value="3" min="1" class="w-full text-center">
                            </div>
                        </div>

                        <label class="block text-slate-400 font-bold text-xs mt-4">نسبة العرض</label>
                        <select id="video-ratio" class="w-full font-bold text-slate-300">
                            <option value="9:16">📱 Shorts / Reels (9:16)</option>
                            <option value="16:9">💻 YouTube (16:9)</option>
                            <option value="1:1">🟦 Square (1:1)</option>
                        </select>
                    </div>
                </div>

                <!-- Tab 2: Style -->
                <div id="content-style" class="space-y-4 hidden">
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 space-y-3">
                        <label class="block text-indigo-400 font-bold text-xs flex items-center gap-2">
                            <i class="fa-solid fa-palette"></i> إعدادات المشهد
                        </label>
                        
                        <select id="theme-selector" class="w-full mb-3">
                            <option value="custom">-- سمة مخصصة --</option>
                            <option value="ocean">محيط أزرق</option>
                            <option value="sunset">غروب الشمس</option>
                            <option value="forest">غابة خضراء</option>
                            <option value="galaxy">مجرة بنفسجية</option>
                        </select>

                        <label class="block text-slate-400 text-xs mb-1">ملف الخلفية (صورة/فيديو)</label>
                        <input id="bg-media" type="file" accept="image/*,video/*" class="w-full text-slate-400 mb-3">

                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label class="block mb-1 text-slate-500 text-xs">حركة الخلفية</label>
                                <select id="bg-anim-type" class="w-full text-xs">
                                    <option value="none">ثابت</option>
                                    <option value="slow-zoom">تكبير بطيء</option>
                                    <option value="gentle-pan">تحريك لطيف</option>
                                    <option value="breathe">تنفس نبضي</option>
                                </select>
                            </div>
                            <div>
                                <label class="block mb-1 text-slate-500 text-xs">فلتر اللون</label>
                                <select id="color-filter" class="w-full text-xs">
                                    <option value="none">طبيعي</option>
                                    <option value="cinematic">سينمائي</option>
                                    <option value="warm">دافئ</option>
                                    <option value="cool">بارد</option>
                                    <option value="noir">نوير</option>
                                </select>
                            </div>
                        </div>

                        <div class="space-y-3 mt-4 pt-4 border-t border-slate-700/50">
                            <div>
                                <label class="flex justify-between text-xs text-slate-400 mb-1">
                                    <span>شفافية الطبقة السوداء</span>
                                    <span id="opacity-val">40%</span>
                                </label>
                                <input type="range" id="bg-opacity" min="0" max="90" value="40">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab 3: Text -->
                <div id="content-text" class="space-y-4 hidden">
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 space-y-3">
                        <label class="block text-indigo-400 font-bold text-xs flex items-center gap-2 border-b border-slate-700/50 pb-2">
                            <i class="fa-solid fa-quote-right"></i> إعدادات الخطوط
                        </label>
                        
                        <select id="font-family" class="w-full">
                            <option value="'Noto Naskh Arabic', serif">نوتو نسخ (قرآني)</option>
                            <option value="'Readex Pro', sans-serif">ريديكس برو (عصري)</option>
                            <option value="'Tajawal', sans-serif">تجوال (واضح)</option>
                        </select>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-slate-900/50 p-2 rounded-lg flex items-center justify-between border border-slate-700/30">
                                <label class="text-xs text-slate-400">لون النص</label>
                                <input type="color" id="text-color" value="#ffffff" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0">
                            </div>
                            <div class="bg-slate-900/50 p-2 rounded-lg flex items-center justify-between border border-slate-700/30">
                                <label class="text-xs text-slate-400">لون الظل</label>
                                <input type="color" id="shadow-color" value="#000000" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0">
                            </div>
                        </div>

                        <div class="mt-3">
                            <label class="flex justify-between text-xs text-slate-400 mb-1">
                                <span>حجم الخط</span>
                                <span id="font-size-val">100%</span>
                            </label>
                            <input type="range" id="font-size" min="60" max="140" value="100">
                        </div>

                        <div class="pt-3 border-t border-slate-700/50">
                            <label class="block mb-2 text-slate-400 font-bold text-xs">الترجمة / التفسير</label>
                            <select id="translation" class="w-full">
                                <option value="none">بدون ترجمة</option>
                                <optgroup label="عربي">
                                    <option value="ar.muyassar">التفسير الميسر</option>
                                    <option value="ar.jalalayn">تفسير الجلالين</option>
                                </optgroup>
                                <optgroup label="English">
                                    <option value="en.asad">Muhammad Asad</option>
                                    <option value="en.pickthall">Pickthall</option>
                                    <option value="en.yusufali">Yusuf Ali</option>
                                </optgroup>
                                <optgroup label="Other Languages">
                                    <option value="fr.hamidullah">Français</option>
                                    <option value="ur.jalandhry">اردو</option>
                                    <option value="es.cortes">Español</option>
                                </optgroup>
                            </select>
                        </div>

                        <label class="flex items-center gap-3 cursor-pointer mt-3 bg-slate-900/30 p-3 rounded-lg border border-slate-700/30">
                            <input type="checkbox" id="text-fade" checked class="w-4 h-4 accent-indigo-500 rounded">
                            <span class="text-xs text-slate-300">تأثير ظهور ناعم للنص</span>
                        </label>
                    </div>
                </div>

                <!-- Tab 4: Audio & FX -->
                <div id="content-audio" class="space-y-4 hidden">
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 space-y-3">
                        <label class="block text-indigo-400 font-bold text-xs flex items-center gap-2 border-b border-slate-700/50 pb-2">
                            <i class="fa-solid fa-sliders"></i> الهندسة الصوتية
                        </label>
                        
                        <div class="space-y-3">
                            <div>
                                <label class="flex justify-between text-xs text-slate-400 mb-1">
                                    <span>صوت القارئ</span>
                                    <span id="vol-reciter-val">100%</span>
                                </label>
                                <input type="range" id="vol-reciter" min="0" max="150" value="100" class="accent-indigo-500">
                            </div>
                            
                            <div class="bg-slate-900/30 p-3 rounded-lg border border-slate-700/30 space-y-2">
                                <label class="flex justify-between text-xs text-slate-400">
                                    <span>مؤثرات صوتية (خلفية)</span>
                                    <span id="vol-bg-val">30%</span>
                                </label>
                                <input id="bg-audio-file" type="file" accept="audio/*" class="w-full text-xs text-slate-500 mb-2">
                                <input type="range" id="vol-bg" min="0" max="100" value="30" class="accent-cyan-500">
                            </div>
                        </div>
                        
                        <div class="pt-3 border-t border-slate-700/50 space-y-3">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox" id="toggle-visualizer" checked class="w-4 h-4 accent-indigo-500 rounded">
                                <span class="text-xs text-slate-300">تفعيل المرئيات الصوتية</span>
                            </label>
                            
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block mb-1 text-[10px] text-slate-500">نمط المرئي</label>
                                    <select id="visualizer-style" class="w-full text-xs">
                                        <option value="particles">جسيمات متحركة</option>
                                        <option value="orbital">مدارات دائرية</option>
                                        <option value="liquid">موجة سائلة</option>
                                        <option value="spectrum">طيف ملون</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="block mb-1 text-[10px] text-slate-500">اللون الرئيسي</label>
                                    <input type="color" id="visualizer-color" value="#6366f1" class="w-full h-8 bg-transparent cursor-pointer rounded">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                        <label class="block mb-2 text-slate-400 font-bold text-xs">علامة مائية</label>
                        <input id="watermark" type="text" placeholder="@username" class="w-full text-center text-xs">
                    </div>
                </div>
                
                <!-- Status Box -->
                <div id="status-box" class="status-box hidden">
                    <p id="status-text" class="text-indigo-300 font-bold text-xs mb-2 text-center">جاري التحضير...</p>
                    <div class="progress-bar">
                        <div id="progress-bar" class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
                
                <a id="download-btn" class="hidden w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white text-center font-bold py-3 rounded-xl transition shadow-lg shadow-green-500/30 block text-sm">
                    <i class="fa-solid fa-download ml-2"></i> تحميل الفيديو
                </a>

            </div>

            <!-- Credits Section -->
            <div class="border-t border-slate-700/50 bg-slate-900/30 p-4 text-center mt-auto">
                <span class="text-xs text-slate-500 font-bold block mb-2">تطوير</span>
                <span class="text-lg font-bold gradient-text block mb-3">Mahmoud Shokri</span>

        // === المحرك الرسومي المحسّن ===
        function render() {
            if(!ctx) return;
            
            // خلفية داكنة أساسية
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            let time = Date.now() * 0.001; // ثواني
            let animEl = document.getElementById('bg-anim-type');
            let animType = animEl ? animEl.value : 'none';
            
            // رسم الخلفية مع الحركة المحسّنة
            ctx.save();
            
            let scale = 1;
            let transX = 0;
            let transY = 0;
            
            if(currentState.bgType !== 'none') {
                // حساب الحركة بحيث لا تخرج الصورة عن الإطار
                let maxOffset = 0; // نسبة الحد الأقصى للتحريك
                
                switch(animType) {
                    case 'slow-zoom':
                        // تكبير بطيء من 1 إلى 1.1 على مدى 30 ثانية
                        scale = 1 + (time % 30) / 300;
                        break;
                    case 'gentle-pan':
                        // تحريك لطيف ذهاب وإياب
                        transX = Math.sin(time * 0.1) * 20;
                        transY = Math.cos(time * 0.08) * 10;
                        break;
                    case 'breathe':
                        // تنفس نبضي
                        scale = 1 + Math.sin(time * 0.5) * 0.02;
                        break;
                }
                
                // ضمان عدم خروج الصورة عن الإطار
                let safeScale = Math.max(scale, 1.15); // نضمن تغطية كاملة
                
                ctx.translate(canvasWidth/2, canvasHeight/2);
                ctx.scale(safeScale, safeScale);
                ctx.translate(-canvasWidth/2 + transX, -canvasHeight/2 + transY);
                
                if(currentState.bgType === 'video' && currentState.bgVideo.readyState >= 2) {
                    drawCover(currentState.bgVideo, currentState.bgVideo.videoWidth, currentState.bgVideo.videoHeight);
                } else if(currentState.bgType === 'image' && currentState.bgImg.src && currentState.bgImg.complete) {
                    drawCover(currentState.bgImg, currentState.bgImg.width, currentState.bgImg.height);
                } else {
                    // خلفية افتراضية متدرجة
                    let g = ctx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
                    g.addColorStop(0, '#1e1b4b');
                    g.addColorStop(0.5, '#0f172a');
                    g.addColorStop(1, '#1e1b4b');
                    ctx.fillStyle = g;
                    ctx.fillRect(-canvasWidth, -canvasHeight, canvasWidth*3, canvasHeight*3);
                }
            } else {
                // خلفية افتراضية
                let g = ctx.createLinearGradient(0, 0, 0, canvasHeight);
                g.addColorStop(0, '#0f172a');
                g.addColorStop(1, '#1e1b4b');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            }
            
            ctx.restore();

            // الفلاتر اللونية
            let filterEl = document.getElementById('color-filter');
            let filter = filterEl ? filterEl.value : 'none';
            
            if(filter !== 'none') {
                ctx.save();
                switch(filter) {
                    case 'cinematic':
                        ctx.fillStyle = 'rgba(59, 130, 246, 0.1)';
                        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                        break;
                    case 'warm':
                        ctx.fillStyle = 'rgba(251, 191, 36, 0.15)';
                        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                        break;
                    case 'cool':
                        ctx.fillStyle = 'rgba(14, 165, 233, 0.15)';
                        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                        break;
                    case 'noir':
                        ctx.globalCompositeOperation = 'saturation';
                        ctx.fillStyle = 'white';
                        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.fillStyle = 'rgba(0,0,0,0.3)';
                        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                        break;
                }
                ctx.restore();
            }

            // طبقة التعتيم
            let opEl = document.getElementById('bg-opacity');
            let op = (opEl ? opEl.value : 40) / 100;
            ctx.fillStyle = `rgba(0,0,0,${op})`;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            // الحصول على بيانات الصوت للمرئيات
            if(analyser && currentState.isRecording) {
                analyser.getByteFrequencyData(dataArray);
                currentState.audioData = Array.from(dataArray);
            } else if(!currentState.isRecording) {
                // محاكاة البيانات للمعاينة
                for(let i = 0; i < currentState.audioData.length; i++) {
                    currentState.audioData[i] = 50 + Math.sin(time * 2 + i * 0.2) * 30;
                }
            }

            // رسم المرئيات الصوتية على Canvas منفصل (Overlay)
            renderVisualizer();

            // النصوص
            let alpha = 1;
            let fadeEl = document.getElementById('text-fade');
            if(fadeEl && fadeEl.checked && currentState.isRecording) {
                let elapsed = (Date.now() - currentState.verseStartTime) / 1000;
                if(elapsed < 1) alpha = Math.max(0.1, elapsed);
            }
            
            ctx.save();
            ctx.globalAlpha = alpha;

            let fontFamEl = document.getElementById('font-family');
            let fontFamily = fontFamEl ? fontFamEl.value : "'Noto Naskh Arabic', serif";
            
            let fontSzEl = document.getElementById('font-size');
            let fontSizeBase = fontSzEl ? parseInt(fontSzEl.value) : 100;
            
            let txtColorEl = document.getElementById('text-color');
            let textColor = txtColorEl ? txtColorEl.value : '#ffffff';
            
            let shdColorEl = document.getElementById('shadow-color');
            let shadowColor = shdColorEl ? shdColorEl.value : '#000000';

            // رسم النص العربي
            let textH = 0;
            if(currentState.textAr) {
                let fSize = (fontSizeBase / 100) * (canvasWidth > 1500 ? 120 : 80);
                ctx.font = `bold ${fSize}px ${fontFamily}`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = textColor;
                ctx.shadowColor = shadowColor;
                ctx.shadowBlur = 20;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 4;
                
                textH = wrapText(ctx, currentState.textAr, canvasWidth / 2, canvasHeight / 2.5, canvasWidth * 0.8, fSize * 1.8);
                ctx.shadowBlur = 0;
            }

            // رسم الترجمة
            if(currentState.textTrans) {
                let transSize = (fontSizeBase / 100) * (canvasWidth > 1500 ? 45 : 32);
                ctx.font = `${transSize}px 'Tajawal', sans-serif`;
                ctx.fillStyle = "rgba(255,255,255,0.85)";
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 10;
                wrapText(ctx, currentState.textTrans, canvasWidth / 2, (canvasHeight / 2.5) + (textH / 2) + (canvasHeight * 0.08), canvasWidth * 0.85, transSize * 1.6);
                ctx.shadowBlur = 0;
            }
            
            ctx.restore();

            // العلامة المائية
            let wmEl = document.getElementById('watermark');
            let wm = wmEl ? wmEl.value : '';
            if(wm) {
                ctx.save();
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                ctx.font = "bold 30px 'Tajawal'";
                ctx.textAlign = "center";
                ctx.fillText(wm, canvasWidth / 2, canvasHeight - 60);
                ctx.restore();
            }

            animationId = requestAnimationFrame(render);
        }

        function renderVisualizer() {
            if(!vizCtx) return;
            
            vizCtx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            let vizToggle = document.getElementById('toggle-visualizer');
            if(!vizToggle || !vizToggle.checked) return;
            
            let vizStyle = document.getElementById('visualizer-style')?.value || 'particles';
            let vizColor = document.getElementById('visualizer-color')?.value || '#6366f1';
            
            let data = currentState.audioData;
            let time = Date.now() * 0.001;
            
            vizCtx.save();
            
            switch(vizStyle) {
                case 'particles':
                    // جسيمات متحركة تتفاعل مع الصوت
                    particles.forEach((p, i) => {
                        let audioVal = data[i % data.length] / 255;
                        let size = p.size + (audioVal * 5);
                        
                        vizCtx.beginPath();
                        vizCtx.arc(p.x, p.y, size, 0, Math.PI * 2);
                        vizCtx.fillStyle = vizColor + Math.floor(p.opacity * 255).toString(16).padStart(2, '0');
                        vizCtx.fill();
                        
                        // حركة الجسيمات
                        p.x += p.speedX + (audioVal * 2);
                        p.y += p.speedY;
                        
                        if(p.x < 0) p.x = canvasWidth;
                        if(p.x > canvasWidth) p.x = 0;
                        if(p.y < 0) p.y = canvasHeight;
                        if(p.y > canvasHeight) p.y = 0;
                    });
                    break;
                    
                case 'orbital':
                    // مدارات دائرية
                    let centerX = canvasWidth / 2;
                    let centerY = canvasHeight / 2;
                    
                    for(let i = 0; i < 3; i++) {
                        let radius = 100 + i * 50;
                        let audioVal = data[i * 10] / 255;
                        
                        vizCtx.beginPath();
                        vizCtx.arc(centerX, centerY, radius + (audioVal * 30), 0, Math.PI * 2);
                        vizCtx.strokeStyle = vizColor;
                        vizCtx.lineWidth = 2 + (audioVal * 3);
                        vizCtx.globalAlpha = 0.3 + (audioVal * 0.5);
                        vizCtx.stroke();
                    }
                    break;
                    
                case 'liquid':
                    // موجة سائلة في الأسفل
                    vizCtx.beginPath();
                    vizCtx.moveTo(0, canvasHeight);
                    
                    for(let x = 0; x <= canvasWidth; x += 10) {
                        let dataIndex = Math.floor((x / canvasWidth) * data.length);
                        let val = data[dataIndex] / 255;
                        let y = canvasHeight - 100 - (val * 150) + Math.sin(x * 0.01 + time) * 20;
                        vizCtx.lineTo(x, y);
                    }
                    
                    vizCtx.lineTo(canvasWidth, canvasHeight);
                    vizCtx.closePath();
                    
                    let gradient = vizCtx.createLinearGradient(0, canvasHeight - 200, 0, canvasHeight);
                    gradient.addColorStop(0, vizColor + '00');
                    gradient.addColorStop(1, vizColor + '80');
                    vizCtx.fillStyle = gradient;
                    vizCtx.fill();
                    break;
                    
                case 'spectrum':
                    // طيف ملون تقليدي but modern
                    let barWidth = canvasWidth / data.length;
                    
                    for(let i = 0; i < data.length; i++) {
                        let val = data[i] / 255;
                        let barHeight = val * canvasHeight * 0.4;
                        
                        let hue = (i / data.length) * 360;
                        vizCtx.fillStyle = `hsla(${hue}, 70%, 60%, ${0.3 + val * 0.7})`;
                        vizCtx.fillRect(i * barWidth, canvasHeight - barHeight, barWidth - 2, barHeight);
                    }
                    break;
            }
            
            vizCtx.restore();
        }

        function drawCover(img, imgW, imgH) {
            let scale = Math.max(canvasWidth / imgW, canvasHeight / imgH);
            let w = imgW * scale;
            let h = imgH * scale;
            let x = (canvasWidth - w) / 2;
            let y = (canvasHeight - h) / 2;
            ctx.drawImage(img, x, y, w, h);
        }

        function wrapText(ctx, text, x, y, maxW, lineH) {
            let words = text.split(' ');
            let line = '';
            let lines = [];
            
            for(let n = 0; n < words.length; n++) {
                let test = line + words[n] + ' ';
                if(ctx.measureText(test).width > maxW && n > 0) {
                    lines.push(line);
                    line = words[n] + ' ';
                } else {
                    line = test;
                }
            }
            lines.push(line);
            
            let startY = y - ((lines.length - 1) * lineH) / 2;
            for(let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i].trim(), x, startY + (i * lineH));
            }
            return lines.length * lineH;
        }

        // === نظام الصوت ===
        async function setupAudio() {
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            destNode = audioCtx.createMediaStreamDestination();
            
            let vr = document.getElementById('vol-reciter')?.value || 100;
            reciterGain = audioCtx.createGain();
            reciterGain.gain.value = vr / 100;
            reciterGain.connect(destNode);
            reciterGain.connect(audioCtx.destination);

            let vb = document.getElementById('vol-bg')?.value || 30;
            bgGain = audioCtx.createGain();
            bgGain.gain.value = vb / 100;
            bgGain.connect(destNode);
            bgGain.connect(audioCtx.destination);

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            reciterGain.connect(analyser);

            let bgAudioInput = document.getElementById('bg-audio-file');
            if(bgAudioInput && bgAudioInput.files[0]) {
                let buf = await bgAudioInput.files[0].arrayBuffer();
                bgAudioBuffer = await audioCtx.decodeAudioData(buf);
            }
        }

        async function fetchAudioWithCORSBypass(audioUrl) {
            const proxies = [
                audioUrl,
                "https://corsproxy.io/?" + encodeURIComponent(audioUrl),
                "https://api.allorigins.win/raw?url=" + encodeURIComponent(audioUrl)
            ];
            
            for(let proxy of proxies) {
                try {
                    let res = await fetch(proxy);
                    if(res.ok) {
                        let arrayBuffer = await res.arrayBuffer();
                        if(arrayBuffer.byteLength > 5000) {
                            return await audioCtx.decodeAudioData(arrayBuffer);
                        }
                    }
                } catch(e) {
                    console.log("Trying next proxy...");
                }
            }
            throw new Error("فشل تحميل الصوت. تأكد من الاتصال بالإنترنت.");
        }

        async function fetchTranslation(surah, ayah, edition) {
            if(edition === 'none') return "";
            try {
                let res = await fetch(`https://api.alquran.cloud/v1/ayah/${surah}:${ayah}/${edition}`);
                let data = await res.json();
                return data.data ? data.data.text : "";
            } catch(e) {
                console.error("Translation fetch error:", e);
                return "";
            }
        }

        // === نظام التصدير ===
        let ffmpeg = null;

        async function initFFmpeg() {
            if(ffmpeg) return;
            const { createFFmpeg } = window.FFmpeg;
            ffmpeg = createFFmpeg({ 
                log: true,
                corePath: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js"
            });
            
            ffmpeg.setProgress(({ ratio }) => {
                const percent = Math.min(Math.round(ratio * 100), 100);
                if(percent > 0) {
                    document.getElementById('status-text').innerText = `جاري التصدير... ${percent}%`;
                    document.getElementById('progress-bar').style.width = `${percent}%`;
                }
            });

            await ffmpeg.load();
        }

        if(document.getElementById('generate-btn')) {
            document.getElementById('generate-btn').addEventListener('click', async () => {
                const btn = document.getElementById('generate-btn');
                const status = document.getElementById('status-box');
                const downloadBtn = document.getElementById('download-btn');

                const surah = document.getElementById('surah').value;
                const reciterFolder = document.getElementById('reciter').value;
                const startAyah = parseInt(document.getElementById('start-ayah').value);
                const endAyah = parseInt(document.getElementById('end-ayah').value);
                const transEdition = document.getElementById('translation').value;

                btn.disabled = true;
                status.classList.remove('hidden');
                downloadBtn.classList.add('hidden');

                try {
                    await setupAudio();
                    await initFFmpeg();

                    // تشغيل الصوت الخلفي إن وجد
                    let bgSourceNode;
                    if(bgAudioBuffer) {
                        bgSourceNode = audioCtx.createBufferSource();
                        bgSourceNode.buffer = bgAudioBuffer;
                        bgSourceNode.loop = true;
                        bgSourceNode.connect(bgGain);
                        bgSourceNode.start(0);
                    }

                    document.getElementById('status-text').innerText = "جاري جلب البيانات...";
                    
                    // جلب نص القرآن
                    let textRes = await fetch(`https://api.alquran.cloud/v1/surah/${surah}/quran-uthmani`);
                    let textData = await textRes.json();
                    let textAyahs = textData.data.ayahs.filter(a => a.numberInSurah >= startAyah && a.numberInSurah <= endAyah);

                    // جلب الترجمات إذا طُلبت
                    let playlist = [];
                    for(let i = 0; i < textAyahs.length; i++) {
                        let ayah = textAyahs[i];
                        let transText = "";
                        
                        if(transEdition !== 'none') {
                            transText = await fetchTranslation(surah, ayah.numberInSurah, transEdition);
                        }
                        
                        let audioUrl = `https://everyayah.com/data/${reciterFolder}/${pad3(surah)}${pad3(ayah.numberInSurah)}.mp3`;
                        let buffer = await fetchAudioWithCORSBypass(audioUrl);
                        
                        playlist.push({
                            textAr: ayah.text + " ﴿" + toArabicNumber(ayah.numberInSurah) + "﴾",
                            textTrans: transText,
                            num: ayah.numberInSurah,
                            buffer: buffer
                        });
                        
                        document.getElementById('progress-bar').style.width = `${((i + 1) / textAyahs.length) * 30}%`;
                    }

                    document.getElementById('status-text').innerText = "جاري التسجيل...";
                    
                    if(currentState.bgType === 'video') {
                        currentState.bgVideo.currentTime = 0;
                        currentState.bgVideo.play();
                    }
                    
                    currentState.isRecording = true;
                    
                    const canvasStream = canvas.captureStream(30);
                    const finalStream = new MediaStream([...canvasStream.getVideoTracks(), ...destNode.stream.getAudioTracks()]);

                    let options = { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 8000000 };
                    if(!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options = { mimeType: 'video/webm; codecs=vp8', videoBitsPerSecond: 8000000 };
                    }

                    const mediaRecorder = new MediaRecorder(finalStream, options);
                    let recordedChunks = [];
                    
                    mediaRecorder.ondataavailable = e => {
                        if(e.data.size > 0) recordedChunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        currentState.isRecording = false;
                        if(bgSourceNode) bgSourceNode.stop();
                        if(currentState.bgType === 'video') currentState.bgVideo.pause();
                        
                        document.getElementById('status-text').innerText = "جاري التحويل إلى MP4...";
                        
                        const webmBlob = new Blob(recordedChunks, { type: 'video/webm' });
                        const webmData = new Uint8Array(await webmBlob.arrayBuffer());

                        try {
                            ffmpeg.FS('writeFile', 'input.webm', webmData);
                            await ffmpeg.run('-y', '-i', 'input.webm', '-c:v', 'libx264', '-preset', 'fast', '-crf', '23', '-c:a', 'aac', '-b:a', '128k', 'output.mp4');
                            
                            const mp4Data = ffmpeg.FS('readFile', 'output.mp4');
                            const mp4Blob = new Blob([mp4Data.buffer], { type: 'video/mp4' });
                            
                            downloadBtn.href = URL.createObjectURL(mp4Blob);
                            downloadBtn.download = `Quran_Video_${Date.now()}.mp4`;
                            downloadBtn.classList.remove('hidden');
                            
                            document.getElementById('status-text').innerText = "✅ تم التصدير بنجاح!";
                            
                            ffmpeg.FS('unlink', 'input.webm');
                            ffmpeg.FS('unlink', 'output.mp4');
                            
                        } catch(err) {
                            console.error(err);
                            document.getElementById('status-text').innerText = "❌ خطأ في التحويل";
                        }
                        
                        btn.disabled = false;
                    };

                    mediaRecorder.start();
                    
                    for(let item of playlist) {
                        await playSegment(item);
                    }
                    
                    setTimeout(() => mediaRecorder.stop(), 1000);

                } catch(e) {
                    console.error(e);
                    document.getElementById('status-text').innerText = "❌ خطأ: " + e.message;
                    btn.disabled = false;
                    currentState.isRecording = false;
                }
            });
        }

        function playSegment(item) {
            return new Promise((resolve) => {
                currentState.textAr = item.textAr;
                currentState.textTrans = item.textTrans;
                currentState.verseStartTime = Date.now();
                
                const source = audioCtx.createBufferSource();
                source.buffer = item.buffer;
                source.connect(reciterGain);
                source.onended = () => resolve();
                source.start(0);

                document.querySelectorAll('.timeline-clip').forEach(el => el.classList.remove('active'));
                let clip = document.getElementById('clip-' + item.num);
                if(clip) clip.classList.add('active');
            });
        }

        // === حفظ واسترجاع ===
        window.savePreset = function() {
            let data = {
                reciter: document.getElementById('reciter')?.value,
                surah: document.getElementById('surah')?.value,
                bgOpacity: document.getElementById('bg-opacity')?.value,
                textColor: document.getElementById('text-color')?.value,
                vizColor: document.getElementById('visualizer-color')?.value,
                watermark: document.getElementById('watermark')?.value,
                translation: document.getElementById('translation')?.value
            };
            localStorage.setItem('quran_studio_preset', JSON.stringify(data));
            
            // إشعار بسيط
            const btn = event.target;
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> تم الحفظ';
            setTimeout(() => btn.innerHTML = original, 2000);
        }

        window.loadPreset = function() {
            let raw = localStorage.getItem('quran_studio_preset');
            if(!raw) {
                alert("لا يوجد إعداد محفوظ");
                return;
            }
            
            let data = JSON.parse(raw);
            if(document.getElementById('reciter')) document.getElementById('reciter').value = data.reciter || '';
            if(document.getElementById('surah')) document.getElementById('surah').value = data.surah || '1';
            if(document.getElementById('bg-opacity')) {
                document.getElementById('bg-opacity').value = data.bgOpacity || 40;
                updateVal('bg-opacity', (data.bgOpacity || 40) + '%');
            }
            if(document.getElementById('text-color')) document.getElementById('text-color').value = data.textColor || '#ffffff';
            if(document.getElementById('visualizer-color')) document.getElementById('visualizer-color').value = data.vizColor || '#6366f1';
            if(document.getElementById('watermark')) document.getElementById('watermark').value = data.watermark || '';
            if(document.getElementById('translation')) document.getElementById('translation').value = data.translation || 'none';
        }

        // === بدء التشغيل ===
        initParticles();
        render();
    </script>
</body>
</html>
