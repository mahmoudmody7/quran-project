<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Studio - Ultimate Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        @font-face { font-family: 'Hafs'; src: url('./fonts/Hafs.ttf'); }
        @font-face { font-family: 'Kitab'; src: url('./fonts/Kitab-Bold.ttf'); }
        @font-face { font-family: 'QuranKarim'; src: url('./fonts/Qurankarim114.ttf'); }
        @font-face { font-family: 'AmiriQuran'; src: url('./fonts/AmiriQuran-Regular.ttf'); }
        @font-face { font-family: 'Cairo'; src: url('./fonts/Cairo-Regular.ttf'); }
        @font-face { font-family: 'ReemKufi'; src: url('./fonts/reem-kufi-regular.ttf'); }
        @font-face { font-family: 'Attari'; src: url('./fonts/Attari_Quran_Shipped.ttf'); }
        @font-face { font-family: 'Muhammadi'; src: url('./fonts/MUHAMMADI QURANIC FONT....ttf'); }
        @font-face { font-family: 'NotoNaskh'; src: url('./fonts/NotoNaskhArabic-Bold.ttf'); }
        @font-face { font-family: 'Saleem'; src: url('./fonts/PDMS_Saleem_QuranFont_ship...ttf'); }
        @font-face { font-family: 'AyatQuran'; src: url('./fonts/ayatquran9-6RYBv.ttf'); }

        body { font-family: 'Cairo', sans-serif; background-color: #09090b; color: #f4f4f5; margin:0; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #e11d48; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #3f3f46; border-radius: 4px; outline: none; margin: 8px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #e11d48; cursor: pointer; box-shadow: 0 0 8px rgba(225, 29, 72, 0.6); }
        select, input[type="text"], input[type="number"], input[type="color"] { width: 100%; padding: 10px; background: #18181b; border: 1px solid #27272a; border-radius: 6px; color: white; font-size: 12px; outline: none; transition: 0.2s; }
        select:focus, input:focus { border-color: #e11d48; }
        
        details { background: #18181b; border: 1px solid #27272a; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
        summary { padding: 14px; font-size: 13px; font-weight: bold; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; color: #cbd5e1; user-select: none; }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #52525b; transition: 0.3s; }
        details[open] summary::after { transform: rotate(180deg); color: #e11d48; }
        details[open] summary { border-bottom: 1px solid #27272a; color: #e11d48; background: rgba(225, 29, 72, 0.05); }
        .details-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

        .canvas-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(#27272a 1px, transparent 1px); background-size: 15px 15px; background-color: #000; border-radius: 8px; overflow: hidden; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }

        .panel-section { display: none; animation: fadeIn 0.3s ease; }
        .panel-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .tab-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: bold; color: #a1a1aa; transition: 0.2s; cursor: pointer; flex: 1; padding: 10px 4px; border-bottom: 3px solid transparent; }
        .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.02); }
        .tab-btn.active { color: #fbbf24; border-bottom-color: #f59e0b; background: #18181b; }

        @media (min-width: 768px) { body { flex-direction: row; } .tab-btn { border-bottom: none; border-right: 3px solid transparent; padding: 15px 8px; } .tab-btn.active { border-right-color: #f59e0b; border-bottom-color: transparent; } }

        .file-btn { position: relative; overflow: hidden; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; padding: 12px; border-radius: 6px; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .file-btn input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        
        .segment-block { margin-bottom: 8px; background: #18181b; border-radius: 6px; border: 1px solid #27272a; overflow: hidden; transition: 0.3s; }
        .segment-block.active { border-color: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.2); }

        .tl-word { display: inline-block; padding: 2px 4px; border-radius: 4px; cursor: pointer; transition: 0.2s; border-bottom: 2px solid transparent; }
        .tl-word:hover { background: #3f3f46; }
        .tl-word.selected { background: rgba(245, 158, 11, 0.3); border-bottom-color: #f59e0b; }
        .tl-word.page-break { border-right: 2px solid #e11d48; margin-right: 4px; padding-right: 4px; }
        .tl-word.page-break::after { content: " ✂️"; font-size: 10px; }
    </style>
</head>
<body>

    <!-- العرض الحي -->
    <main class="flex-none md:flex-1 h-[45vh] md:h-full flex flex-col relative bg-[#09090b] p-2 md:p-4 z-10 shadow-md border-b md:border-b-0 md:border-l border-[#27272a]">
        <div class="flex-1 canvas-container mb-2 border border-[#27272a]">
            <canvas id="video-canvas" width="1080" height="1920"></canvas>
        </div>
        <div class="h-16 bg-[#18181b] rounded-lg border border-[#27272a] flex items-center justify-between px-3 shrink-0">
            <button onclick="changeAyah(-1)" class="text-white bg-[#27272a] hover:bg-amber-600 px-3 py-2 rounded text-xs font-bold transition"><i class="fa-solid fa-chevron-right"></i> السابقة</button>
            <div class="flex-1 px-4 text-center">
                <div class="flex justify-between text-[10px] text-zinc-400 mb-1"><span id="time-current">00:00</span><span id="time-total">00:00</span></div>
                <input type="range" id="progress-bar-audio" min="0" max="100" value="0" class="w-full !h-1.5 !m-0 !accent-amber-500" onchange="seekAudio(this.value)">
                <span id="preview-ayah-label" class="block text-[10px] text-amber-500 font-bold mt-1">المعاينة متوقفة</span>
            </div>
            <button onclick="changeAyah(1)" class="text-white bg-[#27272a] hover:bg-amber-600 px-3 py-2 rounded text-xs font-bold transition">التالية <i class="fa-solid fa-chevron-left"></i></button>
            <button onclick="togglePlay()" id="play-btn" class="w-10 h-10 rounded-full bg-amber-500 hover:bg-amber-600 text-white flex items-center justify-center transition shadow-lg ml-2"><i class="fa-solid fa-play"></i></button>
        </div>
        <audio id="audio-player" class="hidden"></audio>
    </main>

    <!-- لوحة التحكم -->
    <aside class="flex-1 md:w-[400px] bg-[#111113] flex flex-col overflow-hidden relative">
        <div class="h-12 border-b border-[#27272a] flex items-center px-4 shrink-0 bg-[#18181b] shadow-sm z-10 justify-between">
            <h2 id="panel-title" class="font-bold text-sm text-white"><i class="fa-solid fa-book-open text-amber-500 ml-2"></i> المحتوى والآيات</h2>
        </div>

        <div class="flex-1 overflow-y-auto p-3 space-y-2 pb-20 md:pb-4 custom-scrollbar">
            
            <!-- 1. القرآن -->
            <div id="tab-quran" class="panel-section active space-y-3">
                <div class="bg-[#18181b] p-3 rounded-lg border border-[#27272a]">
                    <label class="block text-xs font-bold text-zinc-300 mb-2">القارئ وملف التوقيت</label>
                    <select id="reciter">
                        <option value="Alafasy.js" data-folder="Alafasy_128kbps">مشاري العفاسي</option>
                        <option value="minshawy_murattal.js" data-folder="Minshawy_Murattal_128kbps">محمد صديق المنشاوي (مرتل)</option>
                        <option value="Minshawy_Mujawwad.js" data-folder="Minshawy_Mujawwad_192kbps">محمد صديق المنشاوي (مجود)</option>
                        <option value="Abdul_Basit_Murattal.js" data-folder="Abdul_Basit_Murattal_64kbps">عبد الباسط عبد الصمد (مرتل)</option>
                        <option value="Abdul_Basit_Mujawwad.js" data-folder="Abdul_Basit_Mujawwad_128kbps">عبد الباسط (مجود)</option>
                        <option value="Husary.js" data-folder="Husary_128kbps">الحصري</option>
                        <option value="yasser_ad_dussary.js" data-folder="Yasser_Ad-Dussary_128kbps">ياسر الدوسري</option>
                    </select>
                </div>
                <div class="bg-[#18181b] p-3 rounded-lg border border-[#27272a]">
                    <label class="block text-xs font-bold text-zinc-300 mb-2">السورة والآيات</label>
                    <select id="surah" class="mb-3"></select>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div><label class="block text-[10px] text-zinc-500 mb-1">من آية</label><input type="number" id="start-ayah" value="1" min="1"></div>
                        <div><label class="block text-[10px] text-zinc-500 mb-1">إلى آية</label><input type="number" id="end-ayah" value="3" min="1"></div>
                    </div>
                    <select id="trans-type" class="mb-3">
                        <option value="none">بدون ترجمة</option>
                        <option value="en.asad">English Translation</option>
                        <option value="ar.muyassar">التفسير الميسر</option>
                    </select>
                    <button onclick="generateQuranAudio()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 rounded transition text-xs shadow-lg shadow-amber-600/20">
                        <i class="fa-solid fa-cloud-arrow-down"></i> جلب الآيات وتطبيق التوقيت
                    </button>
                </div>
            </div>

            <!-- 2. الخلفيات + حجم الفيديو الجديد -->
            <div id="tab-bg" class="panel-section space-y-3">
                <!-- حجم ونسبة الفيديو -->
                <div class="bg-amber-950/20 p-4 rounded-xl border border-amber-800">
                    <h3 class="text-xs font-bold text-amber-300 mb-3"><i class="fa-solid fa-expand-arrows-alt text-amber-500 ml-2"></i> حجم الفيديو للسوشيال ميديا</h3>
                    <select id="video-preset" onchange="changeVideoSize(this.value)" class="w-full text-sm font-medium">
                        <option value="vertical" selected>📱 عمودي (TikTok / Reels / Shorts) — 1080×1920</option>
                        <option value="horizontal">🖥️ أفقي (YouTube) — 1920×1080</option>
                        <option value="square">⬛ مربع (Instagram Post) — 1080×1080</option>
                        <option value="stories">📖 ستوريز (Instagram Stories) — 1080×1920</option>
                    </select>
                    <p class="text-[9px] text-amber-400 mt-2">سيتم تغيير حجم الكانفاس فوراً والتصدير يتكيف تلقائياً</p>
                </div>

                <!-- الخلفية العامة -->
                <div class="bg-[#18181b] p-3 rounded-lg border border-[#27272a]">
                    <h3 class="text-xs font-bold text-white mb-3"><i class="fa-solid fa-globe text-amber-500 ml-1"></i> خلفية الفيديو العامة</h3>
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <div class="file-btn bg-[#27272a] hover:bg-[#3f3f46] text-zinc-200"><i class="fa-solid fa-image text-xl mb-1"></i> رفع صورة<input type="file" accept="image/*" onchange="setBg('global', 'image', this)"></div>
                        <div class="file-btn bg-[#27272a] hover:bg-[#3f3f46] text-zinc-200"><i class="fa-solid fa-video text-xl mb-1"></i> رفع فيديو<input type="file" accept="video/*" onchange="setBg('global', 'video', this)"></div>
                    </div>
                    <label class="flex justify-between text-[10px] text-zinc-300 mb-1"><span>تعتيم الفيديو</span></label>
                    <input type="range" id="bg-opacity" min="0" max="100" value="60" oninput="updateSettings()">
                </div>

                <!-- خلفية خاصة بالآية -->
                <div class="bg-amber-950/20 p-3 rounded-lg border border-amber-900/40">
                    <h3 class="text-xs font-bold text-amber-300 mb-3 flex items-center"><i class="fa-solid fa-bullseye text-amber-500 ml-1"></i> خلفية خاصة بـ (<span id="bg-ayah-label">الآية 1</span>)</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="file-btn bg-amber-900/30 hover:bg-amber-800/50 text-amber-100 border border-amber-800">
                            <i class="fa-solid fa-image text-lg mb-1"></i> تخصيص صورة <input type="file" accept="image/*" onchange="setBg('ayah', 'image', this)">
                        </div>
                        <div class="file-btn bg-amber-900/30 hover:bg-amber-800/50 text-amber-100 border border-amber-800">
                            <i class="fa-solid fa-video text-lg mb-1"></i> تخصيص فيديو <input type="file" accept="video/*" onchange="setBg('ayah', 'video', this)">
                        </div>
                    </div>
                    <button id="btn-clear-ayah-bg" onclick="clearAyahBg()" class="hidden w-full mt-3 bg-red-900/50 hover:bg-red-800 text-red-200 text-xs py-2 rounded border border-red-800 transition"><i class="fa-solid fa-trash ml-1"></i> حذف خلفية هذه الآية</button>
                </div>
            </div>

            <!-- 3. الهوية -->
            <div id="tab-brand" class="panel-section space-y-3">
                <!-- نفس الكود السابق للوجو والموجات والمعلومات (مختصر للاختصار) -->
                <details open>
                    <summary><i class="fa-solid fa-stamp text-amber-500"></i> اللوجو</summary>
                    <div class="details-body">
                        <div class="file-btn bg-[#27272a] hover:bg-[#3f3f46] text-zinc-200 mb-2"><i class="fa-solid fa-upload"></i> رفع صورة اللوجو<input type="file" accept="image/png, image/jpeg" onchange="loadLogo(this)"></div>
                        <input type="text" id="watermark-text" placeholder="أو اكتب نص العلامة..." oninput="updateSettings()">
                    </div>
                </details>
                <!-- الموجات والمعلومات (نفسها) -->
            </div>

            <!-- 4. تصميم النصوص + أنيميشن -->
            <div id="tab-design" class="panel-section space-y-2">
                <div class="bg-[#18181b] p-3 rounded-lg border border-[#27272a]">
                    <label class="text-[10px] text-zinc-500 block mb-1">الخط القرآني</label>
                    <select id="font-family" onchange="updateSettings()" class="mb-3">
                        <option value="'Hafs'">حفص</option>
                        <option value="'Kitab'">كتاب بولد</option>
                        <option value="'QuranKarim'">قرآن كريم</option>
                        <option value="'AmiriQuran'">الأميري</option>
                        <option value="'Cairo'">كايرو</option>
                        <!-- باقي الخطوط -->
                    </select>

                    <label class="text-[10px] text-zinc-500 block mb-1">تأثير التلوين</label>
                    <select id="highlight-style" onchange="updateSettings()" class="mb-3">
                        <option value="quran-gold">تلوين ذهبي</option>
                        <option value="center-focus">كلمة بكلمة في المنتصف</option>
                        <option value="nur-glow">إضاءة نورانية</option>
                    </select>

                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[10px] text-zinc-500 block mb-1">اللون الأساسي</label><input type="color" id="base-color" value="#ffffff" oninput="updateSettings()"></div>
                        <div><label class="text-[10px] text-zinc-500 block mb-1">لون التمييز</label><input type="color" id="highlight-color" value="#fbbf24" oninput="updateSettings()"></div>
                    </div>

                    <!-- أنيميشن النص القرآني -->
                    <details open class="mt-6 border border-amber-800/50 rounded-xl bg-amber-950/10">
                        <summary class="text-xs font-bold text-amber-300"><i class="fa-solid fa-magic text-amber-500 mr-2"></i> أنيميشن النص القرآني</summary>
                        <div class="details-body">
                            <label class="flex items-center space-x-2 rtl:space-x-reverse cursor-pointer mb-3">
                                <input type="checkbox" id="anim-enable" checked onchange="updateSettings()" class="w-3 h-3 accent-amber-500 rounded">
                                <span class="text-[10px] text-zinc-300 font-bold">تفعيل الأنيميشن</span>
                            </label>
                            <select id="anim-style" onchange="updateSettings()" class="mb-3">
                                <option value="none">بدون أنيميشن</option>
                                <option value="pulse-glow" selected>نبض ذهبي متوهج</option>
                                <option value="pop-scale">انفجار تكبير</option>
                                <option value="slide-up">انزلاق ناعم</option>
                                <option value="float-elegant">طفو أنيق</option>
                                <option value="reveal-spark">كشف شراري</option>
                            </select>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="flex justify-between text-[10px] text-zinc-500 mb-1"><span>شدة</span> <span id="anim-int-val">70</span></label><input type="range" id="anim-intensity" min="0" max="100" value="70" oninput="updateSettings();document.getElementById('anim-int-val').innerText=this.value;"></div>
                                <div><label class="flex justify-between text-[10px] text-zinc-500 mb-1"><span>سرعة</span> <span id="anim-speed-val">1.5</span></label><input type="range" id="anim-speed" min="0.5" max="3" step="0.1" value="1.5" oninput="updateSettings();document.getElementById('anim-speed-val').innerText=this.value;"></div>
                            </div>
                        </div>
                    </details>
                </div>
            </div>

            <!-- 5. التوقيت -->
            <div id="tab-timeline" class="panel-section">
                <div id="timeline-container" class="space-y-2"></div>
            </div>

            <!-- 6. التصدير -->
            <div id="tab-export" class="panel-section text-center p-2">
                <button id="btn-export" onclick="startExport()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl text-sm">
                    <i class="fa-solid fa-rocket"></i> بدء تصدير الفيديو
                </button>
                <div id="export-status" class="mt-4 hidden">
                    <p id="status-msg" class="text-emerald-400 text-xs font-bold">جاري التصدير...</p>
                </div>
                <a id="download-link" class="hidden mt-4 w-full block bg-emerald-600 text-white font-bold py-4 rounded-xl"></a>
            </div>
        </div>
    </aside>

    <nav class="w-full md:w-[70px] bg-[#09090b] border-t md:border-t-0 md:border-r border-[#27272a] flex md:flex-col overflow-x-auto shrink-0 z-20 absolute md:relative bottom-0 left-0 right-0">
        <button onclick="switchTab('quran', 'المحتوى والآيات', this)" class="tab-btn active"><i class="fa-solid fa-book-open text-xl mb-1"></i>القرآن</button>
        <button onclick="switchTab('bg', 'الخلفية والحجم', this)" class="tab-btn"><i class="fa-solid fa-video text-xl mb-1"></i>المشهد</button>
        <button onclick="switchTab('brand', 'الهوية', this)" class="tab-btn"><i class="fa-solid fa-stamp text-xl mb-1"></i>الهوية</button>
        <button onclick="switchTab('design', 'التصميم', this)" class="tab-btn"><i class="fa-solid fa-font text-xl mb-1"></i>النصوص</button>
        <button onclick="switchTab('timeline', 'الشاشات', this)" class="tab-btn"><i class="fa-solid fa-cut text-xl mb-1"></i>الشاشات</button>
        <button onclick="switchTab('export', 'التصدير', this)" class="tab-btn text-emerald-500"><i class="fa-solid fa-clapperboard text-xl mb-1"></i>إنتاج</button>
    </nav>

    <script>
        // ==================== المتغيرات الرئيسية ====================
        let C_W = 1080;
        let C_H = 1920;
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d');
        
        const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

        let state = {
            phrases: [], currentIndex: 0,
            globalBg: { type: 'none', media: null }, ayahBgs: {},
            settings: {}, isExporting: false,
            audioCtx: null, audioBuffer: null,
            analyser: null, dataArray: null,
            selectedWord: null, logoImage: null
        };

        const audioPlayer = document.getElementById('audio-player');

        window.onload = () => {
            const sSelect = document.getElementById('surah');
            surahs.forEach((s, i) => sSelect.options.add(new Option(`${i+1}. ${s}`, i+1)));
            updateSettings();
            changeVideoSize('vertical');
            requestAnimationFrame(renderLoop);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && state.selectedWord) {
                    let w = state.selectedWord;
                    if (state.phrases[w.pIdx] && state.phrases[w.pIdx].words[w.wIdx]) {
                        state.phrases[w.pIdx].words[w.wIdx].newPage = !state.phrases[w.pIdx].words[w.wIdx].newPage;
                        renderTimelineUI();
                    }
                }
            });
        };

        function changeVideoSize(preset) {
            switch (preset) {
                case 'vertical':
                case 'stories': C_W = 1080; C_H = 1920; break;
                case 'horizontal': C_W = 1920; C_H = 1080; break;
                case 'square': C_W = 1080; C_H = 1080; break;
            }
            canvas.width = C_W;
            canvas.height = C_H;
            renderLoop();
        }

        function switchTab(id, title, btn) {
            document.querySelectorAll('.panel-section').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('panel-title').innerHTML = `<i class="fa-solid fa-check-circle text-amber-500 ml-2"></i> ${title}`;
        }

        const val = id => document.getElementById(id).value;
        const num = id => parseFloat(document.getElementById(id).value);

        function updateSettings() {
            state.settings = {
                style: val('highlight-style'), baseC: val('base-color'), hiC: val('highlight-color'),
                fontF: val('font-family'), fontS: num('font-size') || 90, posY: num('pos-y') || 45,
                transY: num('trans-y') || 70, bgOp: num('bg-opacity') / 100,
                camOn: document.getElementById('cam-enable') ? document.getElementById('cam-enable').checked : true,
                camType: val('cam-type') || 'zoom',
                filter: val('color-filter') || 'none',
                wmText: val('watermark-text'), logoX: 0.5, logoY: 0.1,
                infoOn: true, infoFont: "'Cairo'", infoColor: "#ffffff",
                vizOn: true, vizStyle: 'bars', vizColor: '#f59e0b',
                animOn: document.getElementById('anim-enable').checked,
                animStyle: val('anim-style'), animInt: num('anim-intensity')/100, animSpeed: num('anim-speed')
            };
        }

        // باقي الدوال (setBg, clearAyahBg, changeAyah, updatePreviewUI, fetchTimingFile, safeFetchAudio, loadLogo, renderTimelineUI, mergeAudioBuffers, bufferToWave, toArabicNumber, formatTime, togglePlay, seekAudio) كما في النسخة السابقة بدون تغيير

        async function generateQuranAudio() {
            const btnText = document.getElementById('btn-fetch-text') || {innerText: ''};
            const surah = parseInt(val('surah'));
            const start = parseInt(val('start-ayah'));
            const end = parseInt(val('end-ayah'));
            const recSelect = document.getElementById('reciter');
            const audioFolder = recSelect.options[recSelect.selectedIndex].dataset.folder;

            btnText.innerText = "جاري الجلب...";
            btnText.parentElement.classList.add('opacity-50', 'pointer-events-none');

            try {
                let resAr = await fetch(`https://api.alquran.cloud/v1/surah/${surah}/quran-uthmani`);
                let dataAr = await resAr.json();

                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!state.audioCtx) state.audioCtx = new AudioContext();

                let buffers = [];
                let globalTimeMs = 0;
                state.phrases = [];

                for (let i = start; i <= end; i++) {
                    let arrayBuffer = await safeFetchAudio(surah, i, audioFolder);
                    let decodedBuffer = await state.audioCtx.decodeAudioData(arrayBuffer);
                    buffers.push(decodedBuffer);

                    // 🔥 تم إزالة الترقيم تماماً
                    let ayahText = dataAr.data.ayahs[i-1].text;

                    let wordsArr = ayahText.split(' ');
                    let wordsData = [];
                    let durationMs = decodedBuffer.duration * 1000;

                    wordsArr.forEach((wText, idx) => {
                        let wStart = globalTimeMs + (idx * durationMs / wordsArr.length);
                        let wEnd = wStart + (durationMs / wordsArr.length);
                        wordsData.push({ text: wText, start: wStart, end: wEnd, newPage: false });
                    });

                    state.phrases.push({ num: i, startTime: globalTimeMs, endTime: globalTimeMs + durationMs, words: wordsData, trans: "" });
                    globalTimeMs += durationMs;
                }

                state.audioBuffer = mergeAudioBuffers(state.audioCtx, buffers);
                let wavBlob = bufferToWave(state.audioBuffer);
                audioPlayer.src = URL.createObjectURL(wavBlob);

                renderTimelineUI();
                state.currentIndex = 0;
                updatePreviewUI();
                btnText.innerText = "اكتمل!";
            } catch (e) {
                console.error(e);
            } finally {
                btnText.parentElement.classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        // renderLoop مع الأنيميشن الكامل والحجم الديناميكي
        function renderLoop() {
            ctx.clearRect(0, 0, C_W, C_H);
            let s = state.settings;
            let timeMs = state.isExporting ? (Date.now() - (window.exportStartTime || Date.now())) : (audioPlayer.currentTime * 1000);

            let activePhrase = state.phrases.find(p => timeMs >= p.startTime && timeMs <= p.endTime);

            // الخلفية + الكاميرا + الموجات + اللوجو (نفس الكود السابق)

            // النص القرآني مع الأنيميشن
            if (activePhrase) {
                let screens = []; let currentScreen = [];
                activePhrase.words.forEach(w => {
                    if (w.newPage && currentScreen.length > 0) { screens.push(currentScreen); currentScreen = []; }
                    currentScreen.push(w);
                });
                if (currentScreen.length > 0) screens.push(currentScreen);

                let activeScreen = screens[0];
                for (let screen of screens) {
                    if (timeMs >= screen[0].start && timeMs <= screen[screen.length-1].end) { activeScreen = screen; break; }
                }

                ctx.font = `bold ${s.fontS}px ${s.fontF}`;
                ctx.textAlign = "center"; ctx.textBaseline = "middle";

                let lines = []; let currentLine = []; let currentWidth = 0;
                let spaceW = ctx.measureText(" ").width; let maxW = C_W * 0.85;

                activeScreen.forEach(w => {
                    let wWidth = ctx.measureText(w.text).width;
                    if (currentWidth + wWidth + spaceW > maxW && currentLine.length > 0) {
                        lines.push({ words: currentLine, width: currentWidth });
                        currentLine = [w]; currentWidth = wWidth;
                    } else {
                        currentLine.push(w); currentWidth += wWidth + spaceW;
                    }
                });
                if (currentLine.length > 0) lines.push({ words: currentLine, width: currentWidth });

                let lineH = s.fontS * 1.6;
                let startY = (C_H * (s.posY/100)) - ((lines.length - 1) * lineH) / 2;

                lines.forEach((line, i) => {
                    let y = startY + (i * lineH);
                    let startX = (C_W / 2) + (line.width / 2);

                    line.words.forEach(w => {
                        let wWidth = ctx.measureText(w.text).width;
                        let centerX = startX - (wWidth / 2);
                        let isActive = timeMs >= w.start && timeMs <= w.end;
                        let wordProgress = isActive ? Math.min(1, (timeMs - w.start) / (w.end - w.start)) : 0;

                        let useAnim = s.animOn && s.animStyle !== 'none' && isActive;
                        let drawScale = 1, drawOffsetY = 0, drawGlow = 0, drawAlpha = 1;

                        if (useAnim) {
                            const intensity = s.animInt || 0.7;
                            const speed = s.animSpeed || 1.5;
                            switch (s.animStyle) {
                                case 'pulse-glow':
                                    let pulse = Math.sin(wordProgress * Math.PI * 4 * speed) * 0.5 + 0.5;
                                    drawScale = 1 + pulse * 0.12 * intensity;
                                    drawGlow = 20 + pulse * 30 * intensity;
                                    break;
                                case 'pop-scale':
                                    drawScale = 0.75 + Math.pow(wordProgress, 0.4) * 0.45 * intensity;
                                    drawGlow = 15 * intensity;
                                    break;
                                case 'slide-up':
                                    let slide = 1 - Math.pow(1 - wordProgress, 3);
                                    drawOffsetY = (1 - slide) * 75 * intensity;
                                    drawAlpha = slide * 0.4 + 0.6;
                                    break;
                                case 'float-elegant':
                                    drawOffsetY = Math.sin(timeMs / 650 * speed) * 14 * intensity;
                                    break;
                                case 'reveal-spark':
                                    drawScale = 0.82 + wordProgress * 0.28 * intensity;
                                    drawGlow = wordProgress * 48 * intensity;
                                    break;
                            }
                        }

                        ctx.shadowBlur = 0;
                        if (isActive) {
                            ctx.fillStyle = s.hiC;
                            ctx.shadowColor = s.hiC;
                            ctx.shadowBlur = drawGlow;
                        } else {
                            ctx.fillStyle = s.baseC;
                            ctx.globalAlpha = 0.85;
                        }
                        ctx.globalAlpha *= drawAlpha;

                        ctx.save();
                        ctx.translate(centerX, y + drawOffsetY);
                        ctx.scale(drawScale, drawScale);
                        ctx.fillText(w.text, 0, 0);
                        ctx.restore();

                        ctx.globalAlpha = 1;
                        ctx.shadowBlur = 0;

                        startX -= (wWidth + spaceW);
                    });
                });
            }

            requestAnimationFrame(renderLoop);
        }


        
        

        function drawCover(img, w, h) { 
            let r = Math.max(C_W/w, C_H/h); 
            let cw = w*r, ch = h*r; 
            ctx.drawImage(img, 0, 0, w, h, (C_W-cw)/2, (C_H-ch)/2, cw, ch); 
        }
        
        function wrapTextLine(ctx, t, x, y, mW, lH) {
            let w=t.split(' '), line='', lines=[];
            for(let n=0; n<w.length; n++) { 
                let test=line+w[n]+' '; 
                if(ctx.measureText(test).width>mW && n>0) { 
                    lines.push(line); line=w[n]+' '; 
                } else line=test; 
            }
            lines.push(line); 
            let sY = y - ((lines.length-1)*lH)/2;
            for(let i=0; i<lines.length; i++) ctx.fillText(lines[i].trim(), x, sY + (i*lH));
        }

        // ==========================================
        // التصدير (بدون تغيير)
        // ==========================================
        let ffmpeg = null;
        async function startExport() {
            if(state.phrases.length === 0 || !state.audioBuffer) return alert("قم بتجهيز الصوت أولاً.");
            
            const btn = document.getElementById('btn-export');
            const msg = document.getElementById('status-msg');
            const bar = document.getElementById('progress-bar-export');
            const dLink = document.getElementById('download-link');
            
            btn.disabled = true; document.getElementById('export-status').classList.remove('hidden'); dLink.classList.add('hidden');
            state.isExporting = true;
            audioPlayer.pause();

            try {
                if (!ffmpeg) {
                    const { createFFmpeg } = window.FFmpeg;
                    ffmpeg = createFFmpeg({ log: true, corePath: "https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js" });
                    msg.innerText = "جاري تحميل محرك التصدير (FFmpeg)...";
                    await ffmpeg.load();
                }

                msg.innerText = "🔴 جاري التسجيل المباشر للفيديو...";
                bar.style.width = "40%";
                
                let exportAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let dest = exportAudioCtx.createMediaStreamDestination();
                
                state.analyser = exportAudioCtx.createAnalyser();
                state.analyser.fftSize = 128;
                state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);

                const canvasStream = canvas.captureStream(30); 
                const combinedStream = new MediaStream([ ...canvasStream.getVideoTracks(), ...dest.stream.getAudioTracks() ]); 

                let mime = 'video/webm;codecs=vp8';
                if (MediaRecorder.isTypeSupported('video/webm;codecs=h264')) {
                    mime = 'video/webm;codecs=h264';
                }

                const recorder = new MediaRecorder(combinedStream, { 
                    mimeType: mime,
                    videoBitsPerSecond: 8000000 
                });
                
                let chunks = []; 
                recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
                
                recorder.onstop = async () => {
                    state.isExporting = false;
                    msg.innerText = "⚙️ جاري التغليف إلى MP4..."; 
                    bar.style.width = "80%";
                    
                    const videoBlob = new Blob(chunks, { type: mime });

                    try {
                        const webmData = new Uint8Array(await videoBlob.arrayBuffer());
                        ffmpeg.FS('writeFile', 'in.webm', webmData);
                        
                        let ffmpegArgs = [];
                        if (mime.includes('h264')) {
                            ffmpegArgs = ['-i', 'in.webm', '-c', 'copy', 'out.mp4'];
                        } else {
                            ffmpegArgs = ['-i', 'in.webm', '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '30', '-vf', 'scale=720:-2', '-c:a', 'aac', '-b:a', '128k', 'out.mp4'];
                        }
                        
                        const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 120000));
                        await Promise.race([ffmpeg.run(...ffmpegArgs), timeout]);
                        
                        const mp4 = ffmpeg.FS('readFile', 'out.mp4');
                        dLink.href = URL.createObjectURL(new Blob([mp4.buffer], {type: 'video/mp4'}));
                        dLink.download = `Quran_Studio_Ultimate_${Date.now()}.mp4`; 
                        dLink.innerHTML = '<i class="fa-solid fa-download ml-1"></i> تحميل الفيديو بصيغة MP4';
                        dLink.className = "mt-4 w-full block bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition text-sm text-center shadow-lg shadow-emerald-600/30";
                        dLink.classList.remove('hidden');
                        
                        msg.innerText = "✅ اكتمل التصدير بنجاح (MP4)!"; 
                        bar.style.width = "100%"; 
                        ffmpeg.FS('unlink', 'in.webm'); ffmpeg.FS('unlink', 'out.mp4');
                    } catch (err) {
                        msg.innerText = "⚠️ تم استخراج فيديو WebM بنجاح (بديل سريع وآمن)!";
                        msg.classList.replace('text-emerald-400', 'text-amber-400');
                        dLink.href = URL.createObjectURL(videoBlob);
                        dLink.download = `Quran_Studio_Ultimate_${Date.now()}.webm`; 
                        dLink.innerHTML = '<i class="fa-solid fa-download ml-1"></i> تحميل الفيديو الأساسي (WebM)';
                        dLink.className = "mt-4 w-full block bg-amber-600 hover:bg-amber-500 text-white font-bold py-4 rounded-xl transition text-sm text-center";
                        dLink.classList.remove('hidden');
                        bar.style.width = "100%"; 
                    } finally {
                        btn.disabled = false;
                    }
                };

                recorder.start();

                let source = exportAudioCtx.createBufferSource();
                source.buffer = state.audioBuffer;
                
                source.connect(state.analyser);
                state.analyser.connect(dest); 
                source.connect(exportAudioCtx.destination); 

                window.exportStartTime = Date.now(); 
                source.onended = () => { setTimeout(() => recorder.stop(), 500); };
                source.start(0);

            } catch(e) { 
                console.error(e);
                msg.innerText = "❌ حدث خطأ أثناء التحضير."; 
                btn.disabled = false; state.isExporting = false; 
            }
        }
    </script>
