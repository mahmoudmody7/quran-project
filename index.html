<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Studio - Pro UI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- تضمين خطوط القرآن الكريم العثمانية والحديثة -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Noto+Naskh+Arabic:wght@400;600;700&family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; color: #0f172a; margin:0; padding:0; }
        
        /* Custom UI Elements */
        .glass-panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        
        /* Native Accordion Styling */
        details { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 8px; overflow: hidden; transition: all 0.3s; }
        details[open] { background: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-color: #cbd5e1; }
        summary { padding: 12px 16px; font-weight: 700; font-size: 13px; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; color: #334155; }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900; transition: transform 0.3s; color: #64748b; }
        details[open] summary::after { transform: rotate(180deg); color: #4f46e5; }
        details[open] summary { border-bottom: 1px solid #e2e8f0; color: #4f46e5; }
        .details-content { padding: 16px; font-size: 12px; display: flex; flex-direction: column; gap: 12px; }

        /* Sliders */
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #cbd5e1; border-radius: 4px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #4f46e5; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* Inputs */
        select, input[type="text"], input[type="number"] { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; outline: none; transition: border 0.2s; font-size: 12px; }
        select:focus, input:focus { border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1); }
        
        /* Canvas Canvas */
        .canvas-wrapper { position: relative; width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        canvas { width: 100%; height: 100%; object-fit: contain; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-4 md:px-6 shrink-0 z-20 shadow-sm">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-kaaba text-indigo-600 text-2xl"></i>
            <h1 class="font-black text-xl text-slate-800">Quran<span class="text-indigo-600">Studio</span></h1>
        </div>
        <div class="flex gap-2 items-center">
            <button onclick="saveSettings()" class="hidden md:block text-slate-500 hover:text-indigo-600 px-3 py-2 text-sm font-bold transition"><i class="fa-solid fa-save"></i> حفظ</button>
            <button id="generate-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2 shadow-md shadow-indigo-200">
                <i class="fa-solid fa-video"></i> <span>تصدير الفيديو</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden bg-slate-50">
        
        <!-- Center/Left: Settings Columns -->
        <div class="flex-1 flex flex-col md:flex-row overflow-hidden p-4 gap-4">
            
            <!-- Column 1: General Settings (Surah, Reciter, Background) -->
            <div class="flex-1 glass-panel flex flex-col overflow-hidden max-w-sm">
                <div class="p-3 border-b border-slate-200 bg-slate-50 font-bold text-sm text-slate-700 flex items-center gap-2 shrink-0">
                    <i class="fa-solid fa-sliders text-indigo-500"></i> الإعدادات العامة
                </div>
                <div class="p-4 overflow-y-auto flex-1 space-y-4">
                    
                    <!-- Surah & Reciter -->
                    <div>
                        <label class="block mb-1 text-xs font-bold text-slate-600">القارئ</label>
                        <select id="reciter"></select>
                    </div>
                    <div>
                        <label class="block mb-1 text-xs font-bold text-slate-600">السورة</label>
                        <select id="surah" onchange="fetchAyahsForPreview()"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block mb-1 text-xs font-bold text-slate-600">من آية</label>
                            <input id="start-ayah" type="number" value="1" min="1" onchange="fetchAyahsForPreview()">
                        </div>
                        <div>
                            <label class="block mb-1 text-xs font-bold text-slate-600">إلى آية</label>
                            <input id="end-ayah" type="number" value="3" min="1" onchange="fetchAyahsForPreview()">
                        </div>
                    </div>

                    <hr class="border-slate-200">

                    <!-- Background -->
                    <div>
                        <label class="block mb-2 text-xs font-bold text-slate-600"><i class="fa-solid fa-image"></i> خلفية الفيديو العامة</label>
                        <input id="bg-media" type="file" accept="image/*,video/*" class="w-full text-xs file:mr-2 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:bg-indigo-100 file:text-indigo-700 hover:file:bg-indigo-200 cursor-pointer">
                    </div>
                    <div>
                        <label class="flex justify-between text-xs text-slate-500 mb-1">تعتيم الخلفية <span id="bg-opacity-val">60%</span></label>
                        <input type="range" id="bg-opacity" min="0" max="100" value="60" oninput="updateSetting('bgOpacity', this.value); document.getElementById('bg-opacity-val').innerText=this.value+'%'">
                    </div>

                    <!-- Progress Box (Hidden by default) -->
                    <div id="status-box" class="p-4 bg-indigo-50 border border-indigo-100 rounded-lg hidden text-center mt-4">
                        <p id="status-text" class="text-indigo-700 font-bold text-xs mb-3">جاري التحضير...</p>
                        <div class="w-full bg-indigo-100 rounded-full h-2 overflow-hidden">
                            <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                        <a id="download-btn" class="hidden w-full bg-emerald-600 hover:bg-emerald-700 text-white text-center font-bold py-2 rounded mt-3 text-xs">
                            <i class="fa-solid fa-download"></i> تحميل
                        </a>
                    </div>
                </div>
            </div>

            <!-- Column 2: Element Positioning & Styling (Accordions) -->
            <div class="flex-1 glass-panel flex flex-col overflow-hidden max-w-sm">
                <div class="p-3 border-b border-slate-200 bg-slate-50 font-bold text-sm text-slate-700 flex items-center gap-2 shrink-0">
                    <i class="fa-solid fa-layer-group text-indigo-500"></i> إعدادات النصوص والمواقع
                </div>
                <div class="p-3 overflow-y-auto flex-1 pb-10">
                    
                    <!-- Arabic Text -->
                    <details open>
                        <summary><span class="flex items-center gap-2"><i class="fa-solid fa-quran text-slate-400"></i> النص العربي للآية</span></summary>
                        <div class="details-content">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" checked onchange="updateSetting('arabic.show', this.checked)" class="accent-indigo-600"> <span class="text-xs font-bold">تفعيل النص</span>
                            </label>
                            <select onchange="updateSetting('arabic.font', this.value)">
                                <option value="'Amiri Quran', serif">Amiri Quran (خط المصحف)</option>
                                <option value="'Noto Naskh Arabic', serif">Noto Naskh Arabic</option>
                                <option value="'Tajawal', sans-serif">Tajawal (عصري)</option>
                            </select>
                            <div>
                                <label class="text-[10px] text-slate-500">حجم الخط</label>
                                <input type="range" min="30" max="150" value="85" oninput="updateSetting('arabic.size', this.value)">
                            </div>
                            <div class="flex gap-2">
                                <div class="flex-1">
                                    <label class="text-[10px] text-slate-500 block mb-1">اللون</label>
                                    <input type="color" value="#ffffff" oninput="updateSetting('arabic.color', this.value)" class="w-full h-8 cursor-pointer border-0 rounded p-0">
                                </div>
                                <div class="flex-1">
                                    <label class="text-[10px] text-slate-500 block mb-1">لون الظل</label>
                                    <input type="color" value="#000000" oninput="updateSetting('arabic.shadow', this.value)" class="w-full h-8 cursor-pointer border-0 rounded p-0">
                                </div>
                            </div>
                            <!-- X, Y Positioning -->
                            <div class="bg-slate-50 p-2 rounded border border-slate-200">
                                <label class="text-[10px] font-bold text-slate-600 block mb-2"><i class="fa-solid fa-arrows-up-down-left-right"></i> تحريك العنصر</label>
                                <label class="text-[10px] text-slate-500 flex gap-2 items-center mb-1"><span>يمين/يسار</span>
                                    <input type="range" min="0" max="100" value="50" oninput="updateSetting('arabic.x', this.value)">
                                </label>
                                <label class="text-[10px] text-slate-500 flex gap-2 items-center"><span>أعلى/أسفل</span>
                                    <input type="range" min="0" max="100" value="40" oninput="updateSetting('arabic.y', this.value)">
                                </label>
                            </div>
                        </div>
                    </details>

                    <!-- Translation/Tafsir -->
                    <details>
                        <summary><span class="flex items-center gap-2"><i class="fa-solid fa-language text-slate-400"></i> الترجمة / التفسير</span></summary>
                        <div class="details-content">
                            <select id="translation-type" onchange="fetchAyahsForPreview()">
                                <option value="none">بدون ترجمة</option>
                                <option value="en.asad" selected>English</option>
                                <option value="ar.muyassar">التفسير الميسر (عربي)</option>
                            </select>
                            <select onchange="updateSetting('trans.font', this.value)">
                                <option value="'Tajawal', sans-serif">Tajawal</option>
                                <option value="'Cairo', sans-serif">Cairo</option>
                            </select>
                            <div>
                                <label class="text-[10px] text-slate-500">حجم الخط</label>
                                <input type="range" min="20" max="80" value="40" oninput="updateSetting('trans.size', this.value)">
                            </div>
                            <label class="text-[10px] text-slate-500 block">اللون</label>
                            <input type="color" value="#cbd5e1" oninput="updateSetting('trans.color', this.value)" class="w-full h-8 cursor-pointer border-0 rounded p-0">
                            
                            <!-- Position -->
                            <div class="bg-slate-50 p-2 rounded border border-slate-200 mt-2">
                                <label class="text-[10px] text-slate-500 flex gap-2 items-center mb-1"><span>يمين/يسار</span>
                                    <input type="range" min="0" max="100" value="50" oninput="updateSetting('trans.x', this.value)">
                                </label>
                                <label class="text-[10px] text-slate-500 flex gap-2 items-center"><span>أعلى/أسفل</span>
                                    <input type="range" min="0" max="100" value="65" oninput="updateSetting('trans.y', this.value)">
                                </label>
                            </div>
                        </div>
                    </details>

                    <!-- Surah Info -->
                    <details>
                        <summary><span class="flex items-center gap-2"><i class="fa-solid fa-book-open text-slate-400"></i> اسم السورة والقارئ</span></summary>
                        <div class="details-content">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" checked onchange="updateSetting('info.show', this.checked)" class="accent-indigo-600"> <span class="text-xs font-bold">عرض البيانات</span>
                            </label>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="text-[10px] text-slate-500 block mb-1">حجم السورة</label>
                                    <input type="range" min="15" max="60" value="35" oninput="updateSetting('info.surahSize', this.value)">
                                </div>
                                <div>
                                    <label class="text-[10px] text-slate-500 block mb-1">حجم القارئ</label>
                                    <input type="range" min="15" max="60" value="25" oninput="updateSetting('info.reciterSize', this.value)">
                                </div>
                            </div>
                            <!-- Position Surah -->
                            <div class="bg-slate-50 p-2 rounded border border-slate-200 text-[10px]">
                                <strong class="text-slate-600 mb-1 block">موقع اسم السورة</strong>
                                <label class="flex gap-2 items-center mb-1">X: <input type="range" min="0" max="100" value="50" oninput="updateSetting('info.surahX', this.value)"></label>
                                <label class="flex gap-2 items-center">Y: <input type="range" min="0" max="100" value="15" oninput="updateSetting('info.surahY', this.value)"></label>
                            </div>
                            <!-- Position Reciter -->
                            <div class="bg-slate-50 p-2 rounded border border-slate-200 text-[10px]">
                                <strong class="text-slate-600 mb-1 block">موقع اسم القارئ</strong>
                                <label class="flex gap-2 items-center mb-1">X: <input type="range" min="0" max="100" value="50" oninput="updateSetting('info.reciterX', this.value)"></label>
                                <label class="flex gap-2 items-center">Y: <input type="range" min="0" max="100" value="85" oninput="updateSetting('info.reciterY', this.value)"></label>
                            </div>
                        </div>
                    </details>

                    <!-- Visualizer & Watermark -->
                    <details>
                        <summary><span class="flex items-center gap-2"><i class="fa-solid fa-wave-square text-slate-400"></i> الموجة الصوتية والشعار</span></summary>
                        <div class="details-content">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" checked onchange="updateSetting('viz.show', this.checked)" class="accent-indigo-600"> <span class="text-xs font-bold">تفعيل الموجة الصوتية</span>
                            </label>
                            <select onchange="updateSetting('viz.style', this.value)">
                                <option value="symmetric">موجة متماثلة</option>
                                <option value="line">خط مستقيم</option>
                            </select>
                            <input type="color" value="#4f46e5" oninput="updateSetting('viz.color', this.value)" class="w-full h-8 cursor-pointer border-0 rounded p-0">
                            <!-- Position Viz -->
                            <div class="bg-slate-50 p-2 rounded border border-slate-200 text-[10px]">
                                <label class="flex gap-2 items-center mb-1">موقع الموجة (Y): <input type="range" min="0" max="100" value="75" oninput="updateSetting('viz.y', this.value)"></label>
                            </div>

                            <hr class="border-slate-200 my-1">
                            
                            <label class="text-[10px] text-slate-500 block mb-1">شعار / حساب (Watermark)</label>
                            <input type="text" id="watermark-input" placeholder="@YourAccount" oninput="updateSetting('watermark.text', this.value)">
                            <div class="bg-slate-50 p-2 rounded border border-slate-200 text-[10px] mt-2">
                                <label class="flex gap-2 items-center mb-1">X: <input type="range" min="0" max="100" value="50" oninput="updateSetting('watermark.x', this.value)"></label>
                                <label class="flex gap-2 items-center">Y: <input type="range" min="0" max="100" value="95" oninput="updateSetting('watermark.y', this.value)"></label>
                            </div>
                        </div>
                    </details>
                </div>
            </div>
        </div>

        <!-- Right: Preview Column -->
        <div class="lg:w-[400px] xl:w-[450px] p-4 flex flex-col gap-3 shrink-0 bg-white border-r border-slate-200 shadow-[0_0_15px_rgba(0,0,0,0.02)] z-10">
            <div class="flex justify-between items-center text-slate-600">
                <span class="font-bold text-sm"><i class="fa-solid fa-eye text-indigo-500"></i> المعاينة الحية</span>
                <span class="text-[10px] bg-slate-100 px-2 py-1 rounded border border-slate-200">9:16 Shorts</span>
            </div>
            
            <div class="canvas-wrapper flex-1">
                <canvas id="video-canvas" width="1080" height="1920"></canvas>
            </div>

            <!-- Ayah Navigation -->
            <div class="flex items-center justify-between bg-slate-50 border border-slate-200 rounded-lg p-2 mt-2">
                <button onclick="changePreview(-1)" class="bg-white hover:bg-slate-100 text-slate-700 px-4 py-2 rounded text-xs font-bold border border-slate-200 transition shadow-sm">
                    <i class="fa-solid fa-chevron-right mr-1"></i> السابق
                </button>
                <div class="text-center">
                    <span class="block text-xs font-bold text-slate-700" id="preview-ayah-num">آية 1</span>
                    <span class="block text-[9px] text-slate-400" id="preview-surah-name">الفاتحة</span>
                </div>
                <button onclick="changePreview(1)" class="bg-white hover:bg-slate-100 text-slate-700 px-4 py-2 rounded text-xs font-bold border border-slate-200 transition shadow-sm">
                    التالي <i class="fa-solid fa-chevron-left ml-1"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- 1. State & Configuration ---
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d');
        const C_WIDTH = 1080; const C_HEIGHT = 1920;

        // UI Object managing all element properties
        let uiSettings = {
            bgOpacity: 60,
            bgType: 'none', bgImg: new Image(), bgVideo: document.createElement('video'),
            arabic: { show: true, font: "'Amiri Quran', serif", size: 85, color: '#ffffff', shadow: '#000000', x: 50, y: 40 },
            trans: { font: "'Tajawal', sans-serif", size: 40, color: '#cbd5e1', x: 50, y: 65 },
            info: { show: true, surahSize: 35, surahX: 50, surahY: 15, reciterSize: 25, reciterX: 50, reciterY: 85 },
            viz: { show: true, style: 'symmetric', color: '#4f46e5', y: 75 },
            watermark: { text: '', x: 50, y: 95 }
        };

        let currentPreviewData = { textAr: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴿١﴾", textTrans: "In the name of Allah, the Entirely Merciful...", surahName: "الفاتحة", reciterName: "مشاري العفاسي" };
        let ayahsList = []; // Array of { ar, trans, num }
        let currentPreviewIndex = 0;
        let isExporting = false; // Flag for rendering loop

        // Audio Data
        let audioCtx, analyser, dataArray;

        // --- 2. Initialize Data ---
        const reciters = [
            {id:'Alafasy_128kbps', name:'مشاري العفاسي'},
            {id:'Abdurrahmaan_As-Sudais_192kbps', name:'عبد الرحمن السديس'},
            {id:'Husary_128kbps', name:'محمود خليل الحصري'},
            {id:'Abdul_Basit_Murattal_192kbps', name:'عبد الباسط عبد الصمد'}
        ];
        const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس"]; // Abbreviated for snippet

        window.onload = () => {
            const recSelect = document.getElementById('reciter');
            reciters.forEach(r => recSelect.options.add(new Option(r.name, r.id)));
            
            const surSelect = document.getElementById('surah');
            surahNames.forEach((s, i) => surSelect.options.add(new Option(`${i+1}. ${s}`, i+1)));

            uiSettings.bgVideo.muted = true; uiSettings.bgVideo.loop = true; uiSettings.bgVideo.crossOrigin = "anonymous";
            
            fetchAyahsForPreview();
            requestAnimationFrame(renderLoop);
        };

        // Update settings globally from UI
        function updateSetting(path, value) {
            let keys = path.split('.');
            if(keys.length === 1) uiSettings[keys[0]] = value;
            else uiSettings[keys[0]][keys[1]] = value;
        }

        // Background Upload
        document.getElementById('bg-media').addEventListener('change', (e) => {
            const file = e.target.files[0]; if(!file) return;
            const url = URL.createObjectURL(file);
            if(file.type.startsWith('video/')) {
                uiSettings.bgType = 'video'; uiSettings.bgVideo.src = url; uiSettings.bgVideo.play();
            } else {
                uiSettings.bgType = 'image'; uiSettings.bgImg.src = url;
            }
        });

        // --- 3. API & Navigation ---
        async function fetchAyahsForPreview() {
            let sNum = document.getElementById('surah').value;
            let start = parseInt(document.getElementById('start-ayah').value);
            let end = parseInt(document.getElementById('end-ayah').value);
            let tType = document.getElementById('translation-type').value;

            try {
                let resAr = await fetch(`https://api.alquran.cloud/v1/surah/${sNum}/quran-uthmani`);
                let dataAr = await resAr.json();
                
                let dataTrans = null;
                if(tType !== 'none') {
                    let resTr = await fetch(`https://api.alquran.cloud/v1/surah/${sNum}/${tType}`);
                    dataTrans = await resTr.json();
                }

                ayahsList = [];
                for(let i = start; i <= end; i++) {
                    let ayah = dataAr.data.ayahs.find(a => a.numberInSurah === i);
                    let transAyah = dataTrans ? dataTrans.data.ayahs.find(a => a.numberInSurah === i) : null;
                    if(ayah) {
                        ayahsList.push({
                            ar: ayah.text + ` ﴿${toArabicNumber(i)}﴾`,
                            trans: transAyah ? transAyah.text : "",
                            num: i
                        });
                    }
                }
                
                if(ayahsList.length > 0) {
                    currentPreviewIndex = 0;
                    updatePreviewData();
                }
            } catch (e) { console.error("Error fetching ayahs:", e); }
        }

        function changePreview(step) {
            if(ayahsList.length === 0) return;
            currentPreviewIndex += step;
            if(currentPreviewIndex < 0) currentPreviewIndex = 0;
            if(currentPreviewIndex >= ayahsList.length) currentPreviewIndex = ayahsList.length - 1;
            updatePreviewData();
        }

        function updatePreviewData() {
            let item = ayahsList[currentPreviewIndex];
            if(!item) return;
            
            let rSelect = document.getElementById('reciter');
            currentPreviewData.reciterName = rSelect.options[rSelect.selectedIndex].text;
            
            let sSelect = document.getElementById('surah');
            currentPreviewData.surahName = "سُورَةُ " + sSelect.options[sSelect.selectedIndex].text.split('. ')[1];

            currentPreviewData.textAr = item.ar;
            currentPreviewData.textTrans = item.trans;

            document.getElementById('preview-ayah-num').innerText = `آية ${item.num}`;
            document.getElementById('preview-surah-name').innerText = currentPreviewData.surahName;
        }

        function toArabicNumber(n) {
            const d = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩'};
            return n.toString().replace(/\d/g, m => d[m]);
        }

        // --- 4. Render Engine (Live Preview) ---
        function renderLoop() {
            ctx.clearRect(0, 0, C_WIDTH, C_HEIGHT);
            
            // 1. Draw Background
            if(uiSettings.bgType === 'video' && uiSettings.bgVideo.readyState >= 2) {
                drawCover(uiSettings.bgVideo, uiSettings.bgVideo.videoWidth, uiSettings.bgVideo.videoHeight);
            } else if(uiSettings.bgType === 'image' && uiSettings.bgImg.src) {
                drawCover(uiSettings.bgImg, uiSettings.bgImg.width, uiSettings.bgImg.height);
            } else {
                let g = ctx.createLinearGradient(0,0,0,C_HEIGHT); 
                g.addColorStop(0,'#1e293b'); g.addColorStop(1,'#0f172a');
                ctx.fillStyle = g; ctx.fillRect(0,0,C_WIDTH,C_HEIGHT);
            }

            // Opacity Overlay
            ctx.fillStyle = `rgba(0,0,0,${uiSettings.bgOpacity / 100})`;
            ctx.fillRect(0,0,C_WIDTH,C_HEIGHT);

            // 2. Draw Visualizer (Simulated if not exporting)
            if(uiSettings.viz.show) {
                let vizY = C_HEIGHT * (uiSettings.viz.y / 100);
                ctx.save();
                ctx.strokeStyle = uiSettings.viz.color;
                ctx.shadowBlur = 15; ctx.shadowColor = uiSettings.viz.color;
                ctx.lineWidth = 4; ctx.lineCap = 'round';
                
                let time = Date.now() / 200;
                ctx.beginPath();
                if(uiSettings.viz.style === 'symmetric') {
                    for(let i = 0; i < C_WIDTH; i += 25) {
                        let h = isExporting && analyser ? (dataArray[i%dataArray.length]/255)*100 : Math.abs(Math.sin(time + i/50)) * 50 + 10;
                        ctx.moveTo(i, vizY - h); ctx.lineTo(i, vizY + h);
                    }
                } else {
                    ctx.moveTo(0, vizY);
                    for(let i = 0; i <= C_WIDTH; i += 10) {
                        let h = isExporting && analyser ? (dataArray[i%dataArray.length]/255)*50 : Math.sin(time + i/100) * 30;
                        ctx.lineTo(i, vizY - Math.abs(h));
                    }
                }
                ctx.stroke(); ctx.restore();
            }

            // Helper to get X, Y
            const getX = (pct) => C_WIDTH * (pct / 100);
            const getY = (pct) => C_HEIGHT * (pct / 100);

            ctx.textAlign = "center"; ctx.textBaseline = "middle";

            // 3. Draw Info (Surah & Reciter)
            if(uiSettings.info.show) {
                ctx.fillStyle = "#ffffff"; ctx.shadowBlur = 0;
                
                ctx.font = `bold ${uiSettings.info.surahSize}px 'Reem Kufi', sans-serif`;
                ctx.fillText(currentPreviewData.surahName, getX(uiSettings.info.surahX), getY(uiSettings.info.surahY));
                
                ctx.font = `500 ${uiSettings.info.reciterSize}px 'Cairo', sans-serif`;
                ctx.fillText(currentPreviewData.reciterName, getX(uiSettings.info.reciterX), getY(uiSettings.info.reciterY));
            }

            // 4. Draw Arabic Text
            let arabTextH = 0;
            if(uiSettings.arabic.show && currentPreviewData.textAr) {
                ctx.font = `bold ${uiSettings.arabic.size}px ${uiSettings.arabic.font}`;
                ctx.fillStyle = uiSettings.arabic.color;
                ctx.shadowColor = uiSettings.arabic.shadow; ctx.shadowBlur = 10;
                arabTextH = wrapText(ctx, currentPreviewData.textAr, getX(uiSettings.arabic.x), getY(uiSettings.arabic.y), C_WIDTH * 0.9, parseInt(uiSettings.arabic.size) * 1.5);
                ctx.shadowBlur = 0;
            }

            // 5. Draw Translation
            if(currentPreviewData.textTrans) {
                ctx.font = `500 ${uiSettings.trans.size}px ${uiSettings.trans.font}`;
                ctx.fillStyle = uiSettings.trans.color;
                wrapText(ctx, currentPreviewData.textTrans, getX(uiSettings.trans.x), getY(uiSettings.trans.y), C_WIDTH * 0.85, parseInt(uiSettings.trans.size) * 1.4);
            }

            // 6. Draw Watermark
            if(uiSettings.watermark.text) {
                ctx.font = `600 25px 'Tajawal'`;
                ctx.fillStyle = "rgba(255,255,255,0.6)";
                ctx.fillText(uiSettings.watermark.text, getX(uiSettings.watermark.x), getY(uiSettings.watermark.y));
            }

            if(isExporting && analyser) analyser.getByteFrequencyData(dataArray);

            requestAnimationFrame(renderLoop);
        }

        function drawCover(img, w, h) {
            let r = Math.max(C_WIDTH/w, C_HEIGHT/h);
            let cw = w * r, ch = h * r;
            ctx.drawImage(img, 0, 0, w, h, (C_WIDTH-cw)/2, (C_HEIGHT-ch)/2, cw, ch);
        }

        function wrapText(ctx, text, x, y, maxW, lineH) {
            let words = text.split(' '); let line = ''; let lines = [];
            for(let n=0; n<words.length; n++) {
                let test = line + words[n] + ' ';
                if(ctx.measureText(test).width > maxW && n > 0) { lines.push(line); line = words[n] + ' '; }
                else { line = test; }
            }
            lines.push(line);
            let startY = y - ((lines.length-1)*lineH)/2;
            for(let i=0; i<lines.length; i++) ctx.fillText(lines[i].trim(), x, startY + (i*lineH));
            return lines.length * lineH;
        }

        // --- 5. Audio & Export Logic (FFmpeg) ---
        // (تم الاحتفاظ بمنطق FFmpeg القديم مع ربطه بالواجهة الجديدة)
        const { createFFmpeg } = window.FFmpeg;
        const ffmpeg = createFFmpeg({ log: false, corePath: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js" });

        document.getElementById('generate-btn').addEventListener('click', async () => {
            if(ayahsList.length === 0) return alert("يرجى اختيار الآيات أولاً");
            
            const btn = document.getElementById('generate-btn');
            const status = document.getElementById('status-box');
            const pBar = document.getElementById('progress-bar');
            const downBtn = document.getElementById('download-btn');
            
            btn.disabled = true; status.classList.remove('hidden'); downBtn.classList.add('hidden');
            document.getElementById('status-text').innerText = "جاري التحضير وجلب الصوتيات...";
            pBar.style.width = '10%';

            try {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                let dest = audioCtx.createMediaStreamDestination();
                
                analyser = audioCtx.createAnalyser(); analyser.fftSize = 128;
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                let sNum = document.getElementById('surah').value;
                let reciter = document.getElementById('reciter').value;
                let pad3 = (n) => n.toString().padStart(3,'0');

                let playlist = [];
                for(let i=0; i<ayahsList.length; i++) {
                    let item = ayahsList[i];
                    let url = `https://everyayah.com/data/${reciter}/${pad3(sNum)}${pad3(item.num)}.mp3`;
                    
                    // Fetch Audio
                    let res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url)).catch(()=>fetch(url));
                    let buf = await res.arrayBuffer();
                    let decoded = await audioCtx.decodeAudioData(buf);
                    playlist.push({ ...item, buffer: decoded });
                    pBar.style.width = `${10 + ((i+1)/ayahsList.length)*30}%`;
                }

                if (!ffmpeg.isLoaded()) await ffmpeg.load();

                document.getElementById('status-text').innerText = "🔴 جاري التسجيل الحي...";
                pBar.style.width = '50%';
                
                isExporting = true;
                if(uiSettings.bgType === 'video') { uiSettings.bgVideo.currentTime=0; uiSettings.bgVideo.play(); }

                const stream = new MediaStream([...canvas.captureStream(30).getVideoTracks(), ...dest.stream.getAudioTracks()]);
                const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                let chunks = [];
                recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
                
                recorder.onstop = async () => {
                    isExporting = false;
                    document.getElementById('status-text').innerText = "⚙️ جاري تحويل الصيغة النهائية...";
                    pBar.style.width = '80%';

                    const webmData = new Uint8Array(await new Blob(chunks).arrayBuffer());
                    ffmpeg.FS('writeFile', 'in.webm', webmData);
                    
                    // Encode
                    await ffmpeg.run('-i', 'in.webm', '-c:v', 'copy', '-c:a', 'aac', '-b:a', '128k', 'out.mp4');
                    
                    const mp4 = ffmpeg.FS('readFile', 'out.mp4');
                    downBtn.href = URL.createObjectURL(new Blob([mp4.buffer], {type: 'video/mp4'}));
                    downBtn.download = `Quran_Video_${Date.now()}.mp4`;
                    downBtn.classList.remove('hidden');
                    
                    document.getElementById('status-text').innerText = "✅ اكتمل التصدير بنجاح!";
                    pBar.style.width = '100%';
                    btn.disabled = false;
                };

                recorder.start();

                // Play Audio and sync text
                for(let track of playlist) {
                    currentPreviewData.textAr = track.ar;
                    currentPreviewData.textTrans = track.trans;
                    
                    await new Promise(resolve => {
                        let source = audioCtx.createBufferSource();
                        source.buffer = track.buffer;
                        source.connect(analyser);
                        analyser.connect(dest);
                        analyser.connect(audioCtx.destination); // For local hearing
                        source.onended = resolve;
                        source.start(0);
                    });
                }
                
                setTimeout(() => recorder.stop(), 500);

            } catch (err) {
                console.error(err);
                document.getElementById('status-text').innerText = "❌ حدث خطأ!";
                btn.disabled = false;
                isExporting = false;
            }
        });
    </script>
