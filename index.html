<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Studio - Ruby Pro Edition (Fixed Export)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;600;700;900&family=Reem+Kufi:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #09090b; margin:0; padding:0; color: #f4f4f5; }
        .studio-panel { background-color: #18181b; border: 1px solid #27272a; border-radius: 8px; }
        .tab-btn { transition: all 0.2s ease; border-radius: 6px; border: 1px solid transparent; }
        .tab-btn.active { background-color: #e11d48; color: white; border-color: #be123c; box-shadow: 0 0 10px rgba(225, 29, 72, 0.3); }
        .tab-btn:not(.active):hover { background-color: #27272a; }
        .timeline-clip { transition: all 0.2s ease; border-radius: 4px; border-left: 3px solid #52525b; }
        .timeline-clip.active { border-left-color: #e11d48; background-color: rgba(225, 29, 72, 0.1); transform: scale(1.02); }
        .canvas-container { height: 100%; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(#27272a 1px, transparent 1px); background-size: 20px 20px; overflow: hidden; border-radius: 6px; }
        canvas { max-height: 55vh; max-width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.8); background-color: #000; transition: all 0.3s ease; }
        select, input[type="text"], input[type="number"] { background: #09090b; border: 1px solid #3f3f46; color: white; border-radius: 4px; transition: all 0.2s; }
        select:focus, input:focus { border-color: #e11d48; box-shadow: 0 0 0 1px #e11d48; outline: none; }
        select option { background: #18181b; color: white; }
        select optgroup { background: #09090b; color: #fb7185; font-weight: bold; }
        input[type="range"] { accent-color: #e11d48; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #e11d48; }
        .glow-text { text-shadow: 0 0 10px rgba(225, 29, 72, 0.5); }
    </style>
	
    <!-- FFmpeg Stable Version -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-[#18181b] border-b border-[#27272a] h-14 flex items-center justify-between px-6 shrink-0 z-20">
        <div class="flex items-center gap-3">
            <div class="w-2.5 h-2.5 bg-rose-600 rounded-full animate-pulse"></div>
            <h1 class="font-black text-xl tracking-wider text-zinc-100">Quran<span class="text-rose-600 glow-text">Studio</span> <span class="text-[9px] uppercase tracking-widest bg-zinc-800 text-zinc-300 px-2 py-0.5 rounded border border-zinc-700 ml-2">Ruby Edition</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="savePreset()" class="bg-[#27272a] hover:bg-[#3f3f46] text-zinc-300 px-4 py-1.5 rounded text-xs font-bold border border-[#3f3f46] transition"><i class="fa-solid fa-download"></i> حفظ</button>
            <button onclick="loadPreset()" class="bg-[#27272a] hover:bg-[#3f3f46] text-zinc-300 px-4 py-1.5 rounded text-xs font-bold border border-[#3f3f46] transition"><i class="fa-solid fa-upload"></i> استرجاع</button>
            <button id="generate-btn" class="bg-rose-600 hover:bg-rose-500 text-white px-6 py-1.5 rounded text-sm font-bold transition flex items-center gap-2 ml-2 shadow-lg shadow-rose-600/20">
                <i class="fa-solid fa-clapperboard"></i> <span>إنتاج وتصدير Video</span>
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-3 gap-3">
        
        <!-- Sidebar Settings -->
        <aside class="w-[380px] studio-panel flex flex-col shrink-0 overflow-hidden relative order-2">
            <!-- Tabs Navigation -->
            <div class="flex p-2 gap-1 border-b border-[#27272a] bg-[#09090b]">
                <button onclick="switchTab('basic')" id="tab-basic" class="tab-btn active flex-1 text-[11px] font-bold py-2 text-zinc-300"><i class="fa-solid fa-list block mb-1"></i> المحتوى</button>
                <button onclick="switchTab('style')" id="tab-style" class="tab-btn flex-1 text-[11px] font-bold py-2 text-zinc-400"><i class="fa-solid fa-layer-group block mb-1"></i> المشهد</button>
                <button onclick="switchTab('text')" id="tab-text" class="tab-btn flex-1 text-[11px] font-bold py-2 text-zinc-400"><i class="fa-solid fa-t block mb-1"></i> النصوص</button>
                <button onclick="switchTab('audio')" id="tab-audio" class="tab-btn flex-1 text-[11px] font-bold py-2 text-zinc-400"><i class="fa-solid fa-wave-square block mb-1"></i> الصوت</button>
            </div>

            <div class="p-4 overflow-y-auto flex-1 text-sm space-y-5 custom-scrollbar bg-[#18181b]">
                
                <!-- Tab 1: Basics -->
                <div id="content-basic" class="space-y-4">
                    <div class="bg-[#09090b] p-3 rounded-md border border-[#27272a]">
                        <label class="block mb-2 text-rose-500 font-bold text-xs"><i class="fa-solid fa-microphone"></i> اختيار القارئ (مكتبة شاملة)</label>
                        <select id="reciter" class="w-full p-2 mb-3 text-xs"></select>
                        <select id="surah" class="w-full p-2 mb-3"></select>
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <div>
                                <label class="block mb-1 text-zinc-500 text-[10px]">من الآية</label>
                                <input id="start-ayah" type="number" value="1" min="1" class="w-full p-1.5 text-center text-xs">
                            </div>
                            <div>
                                <label class="block mb-1 text-zinc-500 text-[10px]">إلى الآية</label>
                                <input id="end-ayah" type="number" value="3" min="1" class="w-full p-1.5 text-center text-xs">
                            </div>
                        </div>
                        <select id="video-ratio" class="w-full p-2 text-xs font-bold text-zinc-300 border-[#3f3f46]">
                            <option value="9:16">📱 Shorts / Reels (9:16)</option>
                            <option value="16:9">💻 YouTube Wide (16:9)</option>
                            <option value="1:1">🟦 Square (1:1)</option>
                        </select>
                    </div>
                </div>

                <!-- Tab 2: Style -->
                <div id="content-style" class="space-y-4 hidden">
                    <div class="bg-[#09090b] p-3 rounded-md border border-[#27272a]">
                        <label class="block mb-2 text-rose-500 font-bold text-xs"><i class="fa-solid fa-image"></i> إعدادات المشهد</label>
                        <select id="theme-selector" class="w-full p-2 text-xs mb-3 border-[#3f3f46]">
                            <option value="custom">-- قوالب لونية سريعة --</option>
                            <option value="emerald">أخضر إسلامي</option>
                            <option value="gold">أسود وذهبي</option>
                            <option value="midnight">أزرق داكن</option>
                            <option value="ruby" selected>أحمر ياقوتي (افتراضي)</option>
                        </select>
                        
                        <label class="block mb-1 text-zinc-500 text-[10px]">ملف الخلفية</label>
                        <input id="bg-media" type="file" accept="image/*,video/*" class="w-full text-zinc-400 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-[10px] file:bg-zinc-800 file:text-zinc-200 hover:file:bg-zinc-700 mb-3">

                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <div>
                                <label class="block mb-1 text-zinc-500 text-[10px]">حركة الخلفية</label>
                                <select id="bg-anim-type" class="w-full p-1.5 text-[10px]">
                                    <option value="none">بدون حركة</option>
                                    <option value="kenburns">زحف سينمائي</option>
                                    <option value="zoomIn">تكبير</option>
                                    <option value="panRight">تحريك عرضي</option>
                                </select>
                            </div>
                            <div>
                                <label class="block mb-1 text-zinc-500 text-[10px]">فلتر سينمائي</label>
                                <select id="color-filter" class="w-full p-1.5 text-[10px]">
                                    <option value="none">طبيعي</option>
                                    <option value="bw">أبيض وأسود</option>
                                    <option value="warm">دافئ</option>
                                    <option value="cool">بارد</option>
                                </select>
                            </div>
                        </div>

                        <label class="block mb-1 text-zinc-500 text-[10px]">زخارف إسلامية (Overlay)</label>
                        <select id="pattern-type" class="w-full p-1.5 text-[10px] mb-2">
                            <option value="none">بدون</option>
                            <option value="hex">شبكة سداسية</option>
                            <option value="geo">هندسة إسلامية</option>
                            <option value="mashrabiya">مشربية</option>
                            <option value="floral">زخارف نباتية</option>
                            <option value="stars">نجوم</option>
                        </select>

                        <div class="space-y-2 mt-3 pt-3 border-t border-[#27272a]">
                            <div>
                                <label class="flex justify-between text-[10px] text-zinc-400"><span>تعتيم الفيديو</span> <span id="opacity-val">60%</span></label>
                                <input type="range" id="bg-opacity" min="0" max="100" value="60" class="w-full h-1 bg-zinc-700 rounded">
                            </div>
                            <div>
                                <label class="flex justify-between text-[10px] text-zinc-400"><span>وضوح الزخرفة</span> <span id="pattern-opacity-val">15%</span></label>
                                <input type="range" id="pattern-opacity" min="0" max="100" value="15" class="w-full h-1 bg-zinc-700 rounded" oninput="document.getElementById('pattern-opacity-val').innerText=this.value+'%'">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab 3: Text -->
                <div id="content-text" class="space-y-4 hidden">
                    <div class="bg-[#09090b] p-3 rounded-md border border-[#27272a] space-y-3">
                        <label class="block text-rose-500 font-bold text-xs border-b border-[#27272a] pb-2"><i class="fa-solid fa-quote-right"></i> إعدادات الخطوط</label>
                        
                        <select id="font-family" class="w-full p-2 text-xs">
                            <option value="'Amiri Quran', serif">الخط الأميري</option>
                            <option value="'Reem Kufi', sans-serif">ريم كوفي</option>
                            <option value="'Scheherazade New', serif">شهرزاد</option>
                            <option value="'Cairo', sans-serif">كايرو</option>
                        </select>

                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-[#18181b] p-1.5 rounded flex items-center justify-between border border-[#27272a]">
                                <label class="text-[10px] text-zinc-400">لون النص</label>
                                <input type="color" id="text-color" value="#fff1f2" class="w-5 h-5 bg-transparent cursor-pointer rounded">
                            </div>
                            <div class="bg-[#18181b] p-1.5 rounded flex items-center justify-between border border-[#27272a]">
                                <label class="text-[10px] text-zinc-400">لون الظل</label>
                                <input type="color" id="shadow-color" value="#000000" class="w-5 h-5 bg-transparent cursor-pointer rounded">
                            </div>
                        </div>

                        <div>
                            <label class="flex justify-between text-[10px] text-zinc-400 mb-1"><span>حجم الخط</span> <span id="font-size-val">100%</span></label>
                            <input type="range" id="font-size" min="50" max="150" value="100" class="w-full h-1 bg-zinc-700 rounded">
                        </div>

                        <div class="pt-2">
                            <label class="block mb-1 text-zinc-400 font-bold text-[10px]">نص ثانوي (ترجمة/تفسير)</label>
                            <select id="translation" class="w-full p-2 text-xs">
                                <option value="none">بدون</option>
                                <optgroup label="عربي">
                                    <option value="ar.muyassar">التفسير الميسر</option>
                                    <option value="ar.jalalayn">تفسير الجلالين</option>
                                </optgroup>
                                <optgroup label="لغات">
                                    <option value="en.asad">English</option>
                                    <option value="fr.hamidullah">Français</option>
                                    <option value="ur.jalandhry">Urdu</option>
                                </optgroup>
                            </select>
                        </div>

                        <label class="flex items-center space-x-2 rtl:space-x-reverse cursor-pointer mt-2 bg-[#18181b] p-2 rounded border border-[#27272a]">
                            <input type="checkbox" id="text-fade" checked="true" class="w-3 h-3 accent-rose-500 rounded">
                            <span class="text-[10px] text-zinc-300">تأثير الظهور الناعم (Fade In)</span>
                        </label>
                    </div>
                </div>

                <!-- Tab 4: Audio & FX -->
                <div id="content-audio" class="space-y-4 hidden">
                    <div class="bg-[#09090b] p-3 rounded-md border border-[#27272a]">
                        <label class="block mb-3 text-rose-500 font-bold text-xs border-b border-[#27272a] pb-2"><i class="fa-solid fa-sliders"></i> الهندسة الصوتية</label>
                        
                        <div class="space-y-3 mb-3">
                            <div>
                                <label class="flex justify-between text-[10px] text-zinc-400 mb-1">طبقة التلاوة <span id="vol-reciter-val">100%</span></label>
                                <input type="range" id="vol-reciter" min="0" max="150" value="100" class="w-full h-1 bg-zinc-700 accent-rose-500">
                            </div>
                            <div class="p-2 bg-[#18181b] rounded border border-[#27272a]">
                                <label class="flex justify-between text-[10px] text-zinc-400 mb-1">طبقة المؤثرات (ارفع ملف) <span id="vol-bg-val">20%</span></label>
                                <input id="bg-audio-file" type="file" accept="audio/*" class="w-full text-zinc-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 text-[9px] file:bg-zinc-800 file:text-white mb-2">
                                <input type="range" id="vol-bg" min="0" max="100" value="20" class="w-full h-1 bg-zinc-700 accent-blue-500">
                            </div>
                        </div>
                        
                        <div class="pt-2 border-t border-[#27272a]">
                            <label class="flex items-center space-x-2 rtl:space-x-reverse cursor-pointer mb-2">
                                <input type="checkbox" id="toggle-visualizer" checked="true" class="w-3 h-3 accent-rose-500 rounded">
                                <span class="text-[10px] text-zinc-300">عرض الموجات الصوتية</span>
                            </label>
                            
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block mb-1 text-[9px] text-zinc-500">شكل الموجة</label>
                                    <select id="visualizer-style" class="w-full p-1.5 text-[10px]">
                                        <option value="bars">أعمدة هندسية</option>
                                        <option value="wave">موجة سينمائية</option>
                                        <option value="dots">نقاط متناثرة</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="block mb-1 text-[9px] text-zinc-500">اللون</label>
                                    <input type="color" id="visualizer-color" value="#e11d48" class="w-full h-6 bg-transparent cursor-pointer rounded">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-[#09090b] p-3 rounded-md border border-[#27272a]">
                        <label class="block mb-1 text-zinc-400 font-bold text-[10px]">علامة حقوق النشر</label>
                        <input id="watermark" type="text" placeholder="@YourName" class="w-full p-2 text-xs text-center">
                    </div>
                </div>
                
                <!-- Status Box -->
                <div class="mt-auto pt-2">
                    <div id="status-box" class="p-3 bg-rose-900/20 border border-rose-800/50 rounded-md hidden text-center">
                        <p id="status-text" class="text-rose-400 font-bold text-xs animate-pulse mb-2">جاري معالجة البيانات...</p>
                        <div class="w-full bg-zinc-900 rounded-full h-1.5 overflow-hidden">
                            <div id="progress-bar" class="bg-rose-600 h-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                    <a id="download-btn" class="hidden w-full bg-green-600 hover:bg-green-500 text-white text-center font-bold py-2.5 rounded-md transition mt-3 block text-xs shadow-lg shadow-green-600/30">
                        <i class="fa-solid fa-download ml-1"></i> تحميل الفيديو (MP4)
                    </a>
                </div>
            </div>
        </aside>

        <!-- Preview Area -->
        <section class="flex-1 flex flex-col studio-panel overflow-hidden relative order-1">
            <div class="p-2.5 border-b border-[#27272a] flex justify-between items-center bg-[#09090b] z-10">
                <span class="text-xs text-zinc-300 font-bold"><i class="fa-solid fa-desktop text-rose-600 ml-1"></i> العرض الحي</span>
                <span id="res-display" class="text-[9px] bg-[#18181b] text-zinc-400 font-bold px-2 py-0.5 rounded border border-[#27272a]">Shorts (9:16)</span>
            </div>
            <div class="canvas-container flex-1 overflow-hidden relative p-4">
                <canvas id="video-canvas"></canvas>
            </div>
            
            <!-- Timeline inside Preview -->
            <footer class="h-20 bg-[#09090b] border-t border-[#27272a] shrink-0 flex flex-col overflow-hidden">
                <div class="flex-1 p-2 overflow-x-auto flex items-center relative custom-scrollbar">
                    <div class="flex gap-1.5 h-10 items-center w-full min-w-max px-2" id="timeline-tracks">
                        <!-- سيتم ملؤه تلقائياً -->
                    </div>
                </div>
            </footer>
        </section>
        
    </main>

    <script>
        // === المتغيرات والتهيئة ===
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d');
        let audioCtx, destNode, analyser, dataArray;
        let reciterGain, bgGain, bgAudioBuffer = null;
        let canvasWidth = 1080; let canvasHeight = 1920;

        let currentState = {
            bgType: 'none',
            bgImg: new Image(),
            bgVideo: document.createElement('video'),
            textAr: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴿١﴾", 
            textSec: "In the name of Allah, the Entirely Merciful...", 
            isRecording: false,
            verseStartTime: 0,
            startTime: Date.now()
        };
        currentState.bgVideo.muted = true; currentState.bgVideo.loop = true; currentState.bgVideo.crossOrigin = "anonymous";

        // حاوية التوقيت المتقدم (مأخوذة من الكود الأول الثابت)
        let exportState = {
            phrases: [],
            mergedBuffer: null,
            audioStartTime: 0,
            currentAudioTime: 0
        };

        function toArabicNumber(n) {
            if(!n) return '';
            const d = { '0': '٠', '1': '١', '2': '٢', '3': '٣', '4': '٤', '5': '٥', '6': '٦', '7': '٧', '8': '٨', '9': '٩' };
            return n.toString().replace(/\d/g, m => d[m]);
        }
        function pad3(n) { return n.toString().padStart(3,'0'); }

        // === القائمة الشاملة للقراء ===
        const recitersList = {
            "أشهر القراء عالمياً": [
                {id:'Alafasy_128kbps', name:'مشاري العفاسي'},
                {id:'Abdurrahmaan_As-Sudais_192kbps', name:'عبد الرحمن السديس'},
                {id:'MaherAlMuaiqly_128kbps', name:'ماهر المعيقلي'},
                {id:'Yasser_Ad-Dussary_128kbps', name:'ياسر الدوسري'},
                {id:'Ahmed_ibn_Ali_al-Ajamy_128kbps', name:'أحمد بن علي العجمي'}
            ],
            "المدرسة المصرية الذهبية": [
                {id:'Abdul_Basit_Murattal_192kbps', name:'عبد الباسط عبد الصمد (مرتل)'},
                {id:'Minshawy_Murattal_128kbps', name:'محمد صديق المنشاوي (مرتل)'},
                {id:'Husary_128kbps', name:'محمود خليل الحصري (مرتل)'},
                {id:'Mustafa_Ismail_48kbps', name:'مصطفى إسماعيل'}
            ]
        };

        const recSelect = document.getElementById('reciter');
        for(let cat in recitersList){
            let grp = document.createElement('optgroup'); grp.label = cat;
            recitersList[cat].forEach(r => { let o = document.createElement('option'); o.value=r.id; o.innerText=r.name; grp.appendChild(o); });
            if(recSelect) recSelect.appendChild(grp);
        }

        // === الأنماط الزخرفية ===
        const patterns = {
            'hex': 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTAgMjBsMjAtMTBtMCAyMGwtMjAgMTB6bTIwLTEwbDIwIDEwbTAgMjBsLTIwIDEweiIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjEiIGZpbGw9Im5vbmUiLz48L3N2Zz4=',

        // === محرك الرسم (Render Loop) المتزامن مع الصوت المدج ===
        function render() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            let time = Date.now();
            let animEl = document.getElementById('bg-anim-type');
            let animType = animEl ? animEl.value : 'none';
            
            // حساب النص المعروض حالياً بناءً على التوقيت الصوتي الحقيقي
            if (currentState.isRecording && audioCtx) {
                exportState.currentAudioTime = audioCtx.currentTime - exportState.audioStartTime;
                let activePhrase = exportState.phrases.find(p => exportState.currentAudioTime >= p.start && exportState.currentAudioTime <= p.end);
                
                if (activePhrase) {
                    // تأثير التلاشي عند تغير الآية
                    if (currentState.textAr !== activePhrase.textAr) {
                        currentState.verseStartTime = Date.now();
                        
                        // إضاءة التايم لاين
                        document.querySelectorAll('.timeline-clip').forEach(el=>el.classList.remove('active'));
                        let clip = document.getElementById('clip-'+activePhrase.num);
                        if(clip) clip.classList.add('active');
                    }
                    currentState.textAr = activePhrase.textAr;
                    currentState.textSec = activePhrase.textSec;
                } else {
                    currentState.textAr = ""; currentState.textSec = "";
                }
            }

            ctx.save();
            let scale = 1, transX = 0, transY = 0;
            if(currentState.isRecording || animType !== 'none') {
                let progress = (time % 100000) * 0.0005; 
                if(animType === 'zoomIn') scale = 1 + (progress % 0.5);
                else if(animType === 'kenburns') { scale = 1 + Math.sin(progress)*0.1; transX = Math.cos(progress)*50; }
                else if(animType === 'panRight') transX = (progress * 100) % 200;
            }

            ctx.translate(canvasWidth/2, canvasHeight/2);
            ctx.scale(scale, scale);
            ctx.translate(-canvasWidth/2 + transX, -canvasHeight/2);

            if(currentState.bgType === 'video' && currentState.bgVideo.readyState >= 2) {
                drawCover(currentState.bgVideo, currentState.bgVideo.videoWidth, currentState.bgVideo.videoHeight);
            } else if(currentState.bgType === 'image' && currentState.bgImg.src) {
                drawCover(currentState.bgImg, currentState.bgImg.width, currentState.bgImg.height);
            } else {
                let g = ctx.createLinearGradient(0,0,0,canvasHeight); g.addColorStop(0,'#0f172a'); g.addColorStop(1,'#000000');
                ctx.fillStyle = g; ctx.fillRect(0,0,canvasWidth,canvasHeight);
            }
            ctx.restore();

            let filter = document.getElementById('color-filter').value;
            if(filter === 'bw') { ctx.globalCompositeOperation='saturation'; ctx.fillStyle='white'; ctx.fillRect(0,0,canvasWidth,canvasHeight); ctx.globalCompositeOperation='source-over'; }
            if(filter === 'warm') { ctx.fillStyle='rgba(245, 158, 11, 0.1)'; ctx.fillRect(0,0,canvasWidth,canvasHeight); }
            if(filter === 'cool') { ctx.fillStyle='rgba(14, 165, 233, 0.1)'; ctx.fillRect(0,0,canvasWidth,canvasHeight); }

            let op = document.getElementById('bg-opacity').value / 100;
            ctx.fillStyle = `rgba(0,0,0,${op})`; ctx.fillRect(0,0,canvasWidth,canvasHeight);

            let patOp = document.getElementById('pattern-opacity').value / 100;
            if(currentPatternImg && patOp > 0) {
                ctx.globalAlpha = patOp;
                let pat = ctx.createPattern(currentPatternImg, 'repeat');
                ctx.fillStyle = pat; ctx.fillRect(0,0,canvasWidth,canvasHeight);
                ctx.globalAlpha = 1.0;
            }

            // الموجات الصوتية 
            if(document.getElementById('toggle-visualizer').checked) {
                let vizStyle = document.getElementById('visualizer-style').value;
                let vizColor = document.getElementById('visualizer-color').value;
                
                const hex2rgb = (hex) => {
                    const r = parseInt(hex.slice(1, 3), 16); const g = parseInt(hex.slice(3, 5), 16); const b = parseInt(hex.slice(5, 7), 16);
                    return `${r}, ${g}, ${b}`;
                }
                const vizRgb = hex2rgb(vizColor);

                let dataLength = 64;
                if(analyser && currentState.isRecording) {
                    analyser.getByteFrequencyData(dataArray);
                    dataLength = dataArray.length;
                }

                let barW = (canvasWidth/dataLength)*2.5; let x=0;

                ctx.beginPath();
                for(let i=0; i<dataLength; i++){
                    let val = (analyser && currentState.isRecording) ? dataArray[i] : (Math.sin((time/300) + i) * 40 + 50);
                    let h = val * 1.8 * (canvasHeight/1920);
                    
                    ctx.fillStyle = `rgba(${vizRgb}, ${val/400 + 0.3})`;
                    ctx.strokeStyle = `rgba(${vizRgb}, 1)`;
                    ctx.lineWidth = 4;

                    if(vizStyle === 'bars') { ctx.fillRect(x, canvasHeight-h-30, barW, h); } 
                    else if (vizStyle === 'dots') { ctx.beginPath(); ctx.arc(x + barW/2, canvasHeight-h-30, barW/2, 0, Math.PI*2); ctx.fill(); } 
                    else if (vizStyle === 'wave') { if (i === 0) ctx.moveTo(x, canvasHeight-h-30); else ctx.lineTo(x, canvasHeight-h-30); }
                    x+=barW+2;
                }
                if(vizStyle === 'wave') ctx.stroke();
            }

            // النصوص
            let alpha = 1;
            if(document.getElementById('text-fade').checked && currentState.isRecording) {
                let elapsed = (Date.now() - currentState.verseStartTime)/1000;
                if(elapsed < 1) alpha = Math.max(0, elapsed);
            }
            ctx.globalAlpha = alpha;

            let fontFamily = document.getElementById('font-family').value;
            let fontSizeBase = parseInt(document.getElementById('font-size').value);
            let textColor = document.getElementById('text-color').value;
            let shadowColor = document.getElementById('shadow-color').value;

            let textH = 0;
            if(currentState.textAr) {
                let fSize = (fontSizeBase/100) * 85; 
                if(canvasWidth > 1500) fSize *= 1.5;
                ctx.font = `bold ${fSize}px ${fontFamily}`;
                ctx.textAlign = "center"; ctx.textBaseline="middle"; 
                ctx.fillStyle = textColor;
                ctx.shadowColor = shadowColor; ctx.shadowBlur = 15;
                textH = wrapText(ctx, currentState.textAr, canvasWidth/2, canvasHeight/2.2, canvasWidth*0.85, fSize*1.6);
                ctx.shadowBlur = 0;
            }

            if(currentState.textSec) {
                let secSize = (fontSizeBase/100) * 40;
                if(canvasWidth > 1500) secSize *= 1.5;
                ctx.font = `italic ${secSize}px 'Cairo'`;
                ctx.fillStyle = "#cbd5e1";
                wrapText(ctx, currentState.textSec, canvasWidth/2, (canvasHeight/2.2)+(textH/2)+(canvasHeight*0.05), canvasWidth*0.85, secSize*1.5);
            }
            ctx.globalAlpha = 1;

            let wm = document.getElementById('watermark').value;
            if(wm) {
                ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.font = "35px 'Cairo'"; ctx.fillText(wm, canvasWidth/2, 90);
            }

            requestAnimationFrame(render);
        }

        function drawCover(img, imgW, imgH) {
            let r = Math.max(canvasWidth/imgW, canvasHeight/imgH);
            let cx = (canvasWidth - imgW*r)/2; let cy = (canvasHeight - imgH*r)/2;
            ctx.drawImage(img, 0, 0, imgW, imgH, cx, cy, imgW*r, imgH*r);
        }

        function wrapText(ctx, text, x, y, maxW, lineH) {
            let words = text.split(' '); let line = ''; let lines = [];
            for(let n=0; n<words.length; n++) {
                let test = line + words[n] + ' ';
                if(ctx.measureText(test).width > maxW && n > 0) { lines.push(line); line = words[n] + ' '; }
                else { line = test; }
            }
            lines.push(line);
            let startY = y - (lines.length*lineH)/2;
            for(let i=0; i<lines.length; i++) ctx.fillText(lines[i].trim(), x, startY + (i*lineH));
            return lines.length*lineH;
        }

        // === الدوال الصوتية القوية والمصححة ===
        async function setupAudio() {
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            destNode = audioCtx.createMediaStreamDestination();
            
            let vr = document.getElementById('vol-reciter').value;
            reciterGain = audioCtx.createGain();
            reciterGain.gain.value = vr / 100;
            reciterGain.connect(destNode); reciterGain.connect(audioCtx.destination);

            let vb = document.getElementById('vol-bg').value;
            bgGain = audioCtx.createGain();
            bgGain.gain.value = vb / 100;
            bgGain.connect(destNode); bgGain.connect(audioCtx.destination);

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            reciterGain.connect(analyser);

            let bgAudioInput = document.getElementById('bg-audio-file');
            if(bgAudioInput.files[0]) {
                let buf = await bgAudioInput.files[0].arrayBuffer();
                bgAudioBuffer = await audioCtx.decodeAudioData(buf);
            }
        }

        // دالة الجلب المضمونة (لتخطي CORS)
        async function safeFetchAudio(surahNum, ayahNum, reciter) {
            const url = `https://everyayah.com/data/${reciter}/${pad3(surahNum)}${pad3(ayahNum)}.mp3`;
            const proxies =[
                url, 
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
            ];
            for (let p of proxies) {
                try {
                    let res = await fetch(p);
                    if(res.ok) {
                        let arrayBuffer = await res.arrayBuffer();
                        if (arrayBuffer.byteLength > 5000) return await audioCtx.decodeAudioData(arrayBuffer);
                    }
                } catch(e) { console.log("Trying next proxy..."); }
            }
            throw new Error("تعذر جلب الصوت، تأكد من جودة الإنترنت.");
        }

        // دمج الصوتيات في ملف واحد لضمان دقة التسجيل (بدون تقطيع)
        function mergeAudioBuffers(buffers) {
            let totalLength = 0;
            buffers.forEach(b => totalLength += b.length);
            const tmp = audioCtx.createBuffer(buffers[0].numberOfChannels, totalLength, buffers[0].sampleRate);
            let offset = 0;
            buffers.forEach(buffer => {
                for (let channel = 0; channel < buffer.numberOfChannels; channel++) {
                    tmp.getChannelData(channel).set(buffer.getChannelData(channel), offset);
                }
                offset += buffer.length;
            });
            return tmp;
        }

        // === محرك التصدير الخارق (بدون تعليق وبدون أخطاء) ===
        let ffmpeg = null;
        async function initFFmpeg() {
            if (ffmpeg) return;
            const { createFFmpeg } = window.FFmpeg;
            // استخدام رابط مباشر للـ Core لتجنب أخطاء المسارات
            ffmpeg = createFFmpeg({ corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js', log: false });
            ffmpeg.setProgress(({ ratio }) => {
                const percent = Math.min(Math.round(ratio * 100), 100);
                if (percent > 0) {
                    document.getElementById('status-text').innerText = `⚙️ جاري التغليف النهائي (MP4) ... (${percent}%)`;
                    document.getElementById('progress-bar').style.width = `${percent}%`;
                }
            });
            await ffmpeg.load();
        }

        document.getElementById('generate-btn').addEventListener('click', async () => {
            const btn = document.getElementById('generate-btn');
            const status = document.getElementById('status-box');
            const pBar = document.getElementById('progress-bar');
            const downloadBtn = document.getElementById('download-btn');

            const surah = document.getElementById('surah').value;
            const reciterFolder = document.getElementById('reciter').value;
            const startAyah = parseInt(document.getElementById('start-ayah').value);
            const endAyah = parseInt(document.getElementById('end-ayah').value);
            const transType = document.getElementById('translation').value;

            btn.disabled = true; btn.classList.add('opacity-50');
            downloadBtn.classList.add('hidden'); 
            status.classList.remove('hidden');

            try {
                document.getElementById('status-text').innerText = "⏳ جاري إعداد بيئة الصوت...";
                pBar.style.width = '5%';
                await setupAudio();
                
                document.getElementById('status-text').innerText = "📦 تحميل محرك الفيديو...";
                await initFFmpeg(); 

                // جلب النصوص
                let textRes = await fetch(`https://api.alquran.cloud/v1/surah/${surah}/quran-uthmani`);
                let textData = await textRes.json();
                
                let transData = null;
                if(transType !== 'none'){
                    let transRes = await fetch(`https://api.alquran.cloud/v1/surah/${surah}/${transType}`);
                    transData = await transRes.json();
                }

                // جلب ودمج الصوتيات
                let buffers = [];
                exportState.phrases = [];
                let globalTime = 0;

                for (let i = startAyah; i <= endAyah; i++) {
                    document.getElementById('status-text').innerText = `صوتيات الآية ${i}...`;
                    let buffer = await safeFetchAudio(surah, i, reciterFolder);
                    buffers.push(buffer);
                    
                    let arText = textData.data.ayahs[i-1].text + ` ﴿${toArabicNumber(i)}﴾`;
                    let secText = transData ? transData.data.ayahs[i-1].text : "";
                    
                    exportState.phrases.push({
                        num: i,
                        textAr: arText,
                        textSec: secText,
                        start: globalTime,
                        end: globalTime + buffer.duration
                    });
                    
                    globalTime += buffer.duration;
                    pBar.style.width = `${10 + ((i - startAyah + 1) / (endAyah - startAyah + 1)) * 30}%`;
                }

                exportState.mergedBuffer = mergeAudioBuffers(buffers);

                document.getElementById('status-text').innerText = "🔴 جاري التسجيل (استمتع بالمشاهدة)...";
                pBar.style.width = '45%';
                
                if(currentState.bgType === 'video') { currentState.bgVideo.currentTime = 0; currentState.bgVideo.play(); }
                currentState.isRecording = true;
                
                // استخدام إعدادات MediaRecorder قياسية لضمان نجاح التصدير
                const canvasStream = canvas.captureStream(30);
                const finalStream = new MediaStream([...canvasStream.getVideoTracks(), ...destNode.stream.getAudioTracks()]);
                const mediaRecorder = new MediaRecorder(finalStream, { mimeType: 'video/webm; codecs=vp8', videoBitsPerSecond: 5000000 });
                
                let recordedChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                
                // دالة التغليف التي تعمل بعد الانتهاء من التسجيل الحي
                mediaRecorder.onstop = async () => {
                    currentState.isRecording = false;
                    if(currentState.bgType === 'video') currentState.bgVideo.pause();
                    document.getElementById('status-text').innerText = "⚙️ جاري معالجة الفيديو للحصول على MP4...";
                    
                    const webmBlob = new Blob(recordedChunks, { type: 'video/webm' });
                    const webmData = new Uint8Array(await webmBlob.arrayBuffer());

                    try {
                        ffmpeg.FS('writeFile', 'in.webm', webmData);
                        // أمر FFmpeg سريع ومضمون للتحويل لـ MP4
                        await ffmpeg.run('-i', 'in.webm', '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '32', '-c:a', 'aac', '-b:a', '128k', 'out.mp4');
                        
                        const mp4Data = ffmpeg.FS('readFile', 'out.mp4');
                        downloadBtn.href = URL.createObjectURL(new Blob([mp4Data.buffer], { type: 'video/mp4' }));
                        downloadBtn.download = `QuranStudio_${Date.now()}.mp4`;
                        downloadBtn.classList.remove('hidden');
                        
                        document.getElementById('status-text').innerText = "✅ اكتمل التصدير بنجاح!";
                        pBar.style.width = '100%';
                        ffmpeg.FS('unlink', 'in.webm'); ffmpeg.FS('unlink', 'out.mp4');
                    } catch (err) {
                        document.getElementById('status-text').innerText = "❌ فشل التحويل النهائي.";
                        console.error(err);
                    } finally {
                        btn.disabled = false; btn.classList.remove('opacity-50');
                    }
                };

                // تشغيل الصوت الأساسي والخلفية وبدء التسجيل
                mediaRecorder.start();
                exportState.audioStartTime = audioCtx.currentTime;

                let bgSourceNode = null;
                if(bgAudioBuffer) {
                    bgSourceNode = audioCtx.createBufferSource();
                    bgSourceNode.buffer = bgAudioBuffer;
                    bgSourceNode.loop = true;
                    bgSourceNode.connect(bgGain);
                    bgSourceNode.start(0);
                }

                let mainSource = audioCtx.createBufferSource();
                mainSource.buffer = exportState.mergedBuffer;
                mainSource.connect(reciterGain);
                
                // إيقاف التسجيل تلقائياً فور انتهاء تلاوة الآيات المدمجة
                mainSource.onended = () => {
                    if(bgSourceNode) bgSourceNode.stop();
                    setTimeout(() => mediaRecorder.stop(), 500); // إعطاء نصف ثانية إضافية كخاتمة مريحة
                };
                mainSource.start(0);

            } catch (e) {
                console.error(e);
                document.getElementById('status-text').innerText = "❌ خطأ: " + e.message;
                btn.disabled = false; btn.classList.remove('opacity-50');
                currentState.isRecording = false;
            }
        });

        // حفظ واسترجاع
        window.savePreset = function() {
            let data = { reciter: document.getElementById('reciter').value, surah: document.getElementById('surah').value, bgOpacity: document.getElementById('bg-opacity').value, textColor: document.getElementById('text-color').value, vizColor: document.getElementById('visualizer-color').value };
            localStorage.setItem('qs_ruby_preset', JSON.stringify(data));
            alert("تم حفظ القالب بنجاح! 💾");
        }
        window.loadPreset = function() {
            let raw = localStorage.getItem('qs_ruby_preset');
            if(!raw) return alert("لا يوجد قالب محفوظ.");
            let data = JSON.parse(raw);
            if(data.reciter) document.getElementById('reciter').value = data.reciter;
            if(data.surah) document.getElementById('surah').value = data.surah;
            if(data.bgOpacity) document.getElementById('bg-opacity').value = data.bgOpacity;
            if(data.textColor) document.getElementById('text-color').value = data.textColor;
            if(data.vizColor) document.getElementById('visualizer-color').value = data.vizColor;
        }

        requestAnimationFrame(render);
    </script>
</body>
</html>
